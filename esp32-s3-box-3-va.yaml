# =============================================================================
# ESP32-S3-BOX-3 voice assistant - example thin config.
#
# Copy this next to your secrets.yaml, edit the substitutions, flash it. The
# firmware core is pulled from GitHub at compile time, so this file is the only
# one you keep. After the core changes, run `esphome clean` before rebuilding -
# otherwise ESPHome reuses its cached copy of the package.
#
# Docs: README.md   Pinout: docs/HARDWARE.md   Characters: base/faces/README.md
# =============================================================================

substitutions:
  # Pick an assistant and a language by name. Characters:
  #   aura, bit, pixel (no artwork, they draw themselves)
  #   pip, astro, momo, franky, wizard, genie, flare
  # Languages: en, pl - or add your own, see base/lang/README.md
  assistant: pip
  language: en

  # Changing `name` re-creates every entity in Home Assistant.
  name: esp32-s3-box-3-va
  friendly_name: "S3 Box 3 Voice"

  # POSIX form, not an IANA name - the device has no timezone database. Only a
  # fallback until Home Assistant syncs the clock.
  # https://github.com/nayarsystems/posix_tz_db/blob/master/zones.csv
  posix_timezone: "CET-1CEST,M3.5.0,M10.5.0/3"

  # Where spoken replies come out. `tts_output_default` is the boot default of
  # the "TTS output" select; you can change it live in Home Assistant.
  #   This device / External player / Both        (see README.md)
  # The timer alarm ignores this and always rings on the box.
  external_media_player_id: media_player.living_room
  tts_output_default: "This device"

  # --- Screens ---------------------------------------------------------------
  # Each phase shows the page named here. The packages below claim most of them;
  # these two decide what the idle screen is, and what tapping it switches to.
  idle_page: page_home       # clock, date, climate   (needs screens/home.yaml)
  idle_page_alt: page_face   # the character, idling  (every character uses this
                             # same id, so a swap does not touch this line)

  # Home screen entities. Wrong or missing ones are not an error - the label just
  # stays "--" until something answers.
  room_temp_entity: sensor.room_temperature
  room_hum_entity: sensor.room_humidity
  outdoor_temp_entity: sensor.outdoor_temperature

packages:
  core:
    url: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va
    ref: main
    files:
      - base/core.yaml
      - base/screens/home.yaml        # optional: clock, date, climate
      - base/faces/${assistant}.yaml  # the assistant; it pulls in what it needs
      - base/lang/${language}.yaml    # keep the language last
    refresh: 0s

# Optional: encrypt the native API. Add the key to secrets.yaml as well.
# api:
#   encryption:
#     key: !secret api_encryption_key
