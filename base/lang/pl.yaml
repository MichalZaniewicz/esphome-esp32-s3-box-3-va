# Polski.
#
# Musi być wymieniony PO plikach ekranów w `files:` - ESPHome rozstrzyga
# konflikty substitutions na korzyść pliku wymienionego później:
#
#   packages:
#     core:
#       files:
#         - base/core.yaml
#         - base/screens/home.yaml
#         - base/lang/pl.yaml      # <- na końcu
#
# Wszystkie znaki poniżej mieszczą się w GF_Latin_Core, więc nie trzeba nic
# dopisywać do `extra_glyphs`.

substitutions:
  # --- Ekran domowy --------------------------------------------------------
  # Tygodnie zaczynają się od niedzieli, miesiące od stycznia. Miesiące w
  # dopełniaczu, bo data składa się jako "środa, 19 lipca".
  weekday_names: '"niedziela","poniedziałek","wtorek","środa","czwartek","piątek","sobota"'
  month_names: '"stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"'

  home_hint_text: "Naciśnij przycisk albo powiedz „Alexa”"
  home_indoor_label: "W domu"
  home_outdoor_label: "Na zewnątrz"

  # --- Ekrany statusu gołego rdzenia (gdy żaden pakiet postaci nie przejmie fazy)
  text_starting: "Uruchamianie..."
  text_no_wifi: "Brak Wi-Fi"
  text_no_ha: "Brak Home Assistant"
  status_idle: "Gotowy"
  status_listening: "Słucham"
  status_thinking: "Myślę"
  status_replying: "Mówię"
  status_error: "Błąd"
  status_muted: "Mikrofon wyciszony"
  status_timer: "Minęło"

  # --- Terminal (postać `crt`; pozostałe postacie są nieme i nie wymagają tłumaczenia)
  crt_header: "KONSOLA AGENTA"
  crt_idle_hint: "czekam na słowo klucz"
  crt_listen_label: "poziom sygnału"
  crt_muted_text: "mikrofon wyciszony"
  crt_timer_text: "** KONIEC ODLICZANIA **"
  crt_error_text: "** BŁĄD **"
  crt_think_text: "myślę"
