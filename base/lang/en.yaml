# English — the reference translation.
#
# Listing this file is a no-op: these values are already the defaults baked into
# the screens themselves, so a config with no language package speaks English.
# It exists to be COPIED: `cp en.yaml xx.yaml`, translate the right-hand sides,
# and you have a new language. Keep the keys identical.
#
# Usage — the language file must come AFTER the screens it translates, because
# ESPHome resolves later-listed package files at a higher priority and lets them
# win substitution conflicts:
#
#   packages:
#     core:
#       files:
#         - base/core.yaml
#         - base/screens/home.yaml
#         - base/lang/en.yaml      # <- last
#
# See base/lang/README.md.

substitutions:
  # --- Home screen ---------------------------------------------------------
  # Weekdays start at Sunday, months at January. C's strftime only speaks
  # English, which is why these are spelled out rather than formatted.
  weekday_names: '"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"'
  month_names: '"January","February","March","April","May","June","July","August","September","October","November","December"'

  # Printed under the clock. Set to "" for an empty line.
  home_hint_text: "Press the button, or say the wake word"
  home_indoor_label: "Inside"
  home_outdoor_label: "Outside"

  # --- Bare-core status screens (shown when no character package claims a phase)
  text_starting: "Starting..."
  text_no_wifi: "No Wi-Fi"
  text_no_ha: "No Home Assistant"
  status_idle: "Ready"
  status_listening: "Listening"
  status_thinking: "Thinking"
  status_replying: "Speaking"
  status_error: "Error"
  status_muted: "Microphone muted"
  status_timer: "Timer"
