###############################################################################
# Home screen: clock, date, room climate, outdoor temperature.
#
# An OPTIONAL package. Add it to your thin config's `files:` list and point
# `idle_page` at it:
#
#   packages:
#     core:
#       files:
#         - base/core.yaml
#         - base/screens/home.yaml
#   substitutions:
#     idle_page: page_home
#
# Without those two lines the idle phase falls back to `page_status`, the core's
# plain text screen. This package only changes what you look at while nothing is
# happening; the active phases belong to whatever else you install, normally
# base/screens/face.yaml.
#
# The clock comes from the core's `ha_time`, so it needs no entity. The climate
# readings do: set them below or they simply show as "--".
###############################################################################

substitutions:
  # Home Assistant entities. Wrong or missing ones are not an error - ESPHome
  # subscribes anyway and the label stays "--" until something answers.
  room_temp_entity: sensor.room_temperature
  room_hum_entity: sensor.room_humidity
  outdoor_temp_entity: sensor.outdoor_temperature

  # Every string below is English by default and overridable by a language
  # package - add `base/lang/pl.yaml` (or your own) AFTER this file in `files:`
  # and it wins. See base/lang/README.md.
  #
  # C's strftime only speaks English, hence the spelled-out names. Order matters:
  # weekdays start on Sunday, months on January.
  weekday_names: '"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"'
  month_names: '"January","February","March","April","May","June","July","August","September","October","November","December"'
  # Printed under the clock. Set it to "" to leave the line empty.
  home_hint_text: "Press the button, or say the wake word"
  home_indoor_label: "Inside"
  home_outdoor_label: "Outside"

sensor:
  - platform: homeassistant
    id: room_temp
    entity_id: ${room_temp_entity}
    internal: true
    on_value:
      - script.execute: update_home_climate
  - platform: homeassistant
    id: room_hum
    entity_id: ${room_hum_entity}
    internal: true
    on_value:
      - script.execute: update_home_climate
  - platform: homeassistant
    id: outdoor_temp
    entity_id: ${outdoor_temp_entity}
    internal: true
    on_value:
      - script.execute: update_home_climate

# The core's time component, extended with two triggers.
#
# `on_time_sync` is the important one: the clock is only redrawn on the minute
# boundary, so without it a freshly booted device shows "--:--" until the next
# :00 - up to a full minute after Home Assistant has already supplied the time.
# It looks like a slow sync and is really just a late repaint.
time:
  - id: !extend ha_time
    on_time_sync:
      then:
        - script.execute: update_home_clock
    on_time:
      - seconds: 0
        then:
          - script.execute: update_home_clock

script:
  - id: update_home_clock
    then:
      # ONLY WHEN THE MINUTE MOVED. The same reasoning as the date guard below,
      # which was already here - this one was missed. It matters because the
      # script does NOT only run on minute boundaries: on_time_sync calls it too,
      # every time Home Assistant resynchronises the clock, landing mid-minute.
      # Each of those reallocated, copied and re-laid-out the 64 px clock, the
      # single most expensive widget on this screen, to draw the same characters.
      #
      # An invalid time maps to -1, the same as the initial value, so the call
      # from on_boot writes nothing and the label keeps the "--:--" it is defined
      # with. Change that default and you get a blank clock until the first sync.
      - if:
          condition:
            lambda: |-
              auto now = id(ha_time).now();
              static int seen = -1;
              const int m = now.is_valid() ? (now.hour * 60 + now.minute) : -1;
              if (seen == m) return false;
              seen = m;
              return true;
          then:
            - lvgl.label.update:
                id: home_clock
                text: !lambda |-
                  auto now = id(ha_time).now();
                  if (!now.is_valid()) {
                    return std::string("--:--");
                  }
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%02d:%02d", now.hour, now.minute);
                  return std::string(buf);
      # The date changes once a day, but this script runs on every minute
      # boundary. lv_label_set_text never compares - it reallocs, copies and
      # re-lays-out the text - so this was 1439 pointless reflows a day.
      - if:
          condition:
            lambda: |-
              auto now = id(ha_time).now();
              if (!now.is_valid()) return false;
              static int seen = -1;
              if (seen == now.day_of_year) return false;
              seen = now.day_of_year;
              return true;
          then:
            - lvgl.label.update:
                id: home_date
                text: !lambda |-
                  auto now = id(ha_time).now();
                  static const char *const WEEKDAYS[] = {${weekday_names}};
                  static const char *const MONTHS[] = {${month_names}};
                  char buf[48];
                  snprintf(buf, sizeof(buf), "%s, %d %s",
                           WEEKDAYS[now.day_of_week - 1], now.day_of_month, MONTHS[now.month - 1]);
                  return std::string(buf);

  - id: update_home_climate
    then:
      # Build both strings once, then write each label only if its text actually
      # changed. Any one of three sensors runs this script, and Home Assistant
      # republishes a state on every event - so a thermometer reporting the same
      # 21.4 every 30 s used to produce a fresh, identical label write, and an
      # outdoor reading repainted the indoor label too. lv_label_set_text never
      # compares: it reallocs, copies and re-lays-out every time.
      - lambda: |-
          char buf[48];
          const std::string temp = std::isnan(id(room_temp).state)
              ? "--" : str_snprintf("%.1f", 8, id(room_temp).state);
          if (std::isnan(id(room_hum).state)) {
            snprintf(buf, sizeof(buf), "%s  %s°", "${home_indoor_label}", temp.c_str());
          } else {
            snprintf(buf, sizeof(buf), "%s  %s°  %.0f%%",
                     "${home_indoor_label}", temp.c_str(), id(room_hum).state);
          }
          id(home_indoor_text) = buf;

          if (std::isnan(id(outdoor_temp).state)) {
            snprintf(buf, sizeof(buf), "%s  --°", "${home_outdoor_label}");
          } else {
            snprintf(buf, sizeof(buf), "%s  %.1f°",
                     "${home_outdoor_label}", id(outdoor_temp).state);
          }
          id(home_outdoor_text) = buf;
      - if:
          condition:
            lambda: |-
              static std::string seen;
              if (seen == id(home_indoor_text)) return false;
              seen = id(home_indoor_text);
              return true;
          then:
            - lvgl.label.update:
                id: home_indoor
                text: !lambda return id(home_indoor_text);
      - if:
          condition:
            lambda: |-
              static std::string seen;
              if (seen == id(home_outdoor_text)) return false;
              seen = id(home_outdoor_text);
              return true;
          then:
            - lvgl.label.update:
                id: home_outdoor
                text: !lambda return id(home_outdoor_text);

globals:
  - id: home_indoor_text
    type: std::string
    restore_value: false
  - id: home_outdoor_text
    type: std::string
    restore_value: false

# Paint once at boot so the screen is not blank before the first tick or the
# first Home Assistant value arrives.
esphome:
  on_boot:
    # Say so in the log. Whether an optional package actually made it into the
    # build is otherwise invisible - nothing here has a dump_config - and a
    # stale copy of the thin config is the easiest mistake to make.
    - priority: 800
      then:
        - logger.log:
            level: INFO
            format: "package: screens/home.yaml (clock + climate)"
    - priority: 500
      then:
        - script.execute: update_home_clock
        - script.execute: update_home_climate

font:
  # Digits and a colon only - a 64 px font with a full glyphset would cost far
  # more flash than the clock needs.
  - id: font_clock
    file:
      type: gfonts
      family: ${font_family}
      weight: 300
    size: 64
    glyphs: "0123456789:-"
  - id: font_home_small
    file:
      type: gfonts
      family: ${font_family}
      weight: 400
    size: 15
    glyphsets:
      - ${font_glyphsets}
    extras:
      - file:
          type: gfonts
          family: ${font_family}
          weight: 400
        glyphs: ${extra_glyphs}

lvgl:
  pages:
    - id: page_home
      bg_color: 0x000000
      widgets:
        # Date, top left.
        - label:
            id: home_date
            align: TOP_LEFT
            x: 12
            y: 10
            text: ""
            text_font: font_home_small
            text_color: 0x8A8A8A

        # The clock, and the reason this screen exists.
        - label:
            id: home_clock
            align: CENTER
            y: -14
            text: "--:--"
            text_font: font_clock
            text_color: 0xFFFFFF

        - label:
            id: home_hint
            align: CENTER
            y: 32
            text: "${home_hint_text}"
            text_font: font_home_small
            text_color: 0x5A5A5A

        # Climate row, clear of the timer strip that lives on the top layer.
        - label:
            id: home_indoor
            align: BOTTOM_LEFT
            x: 12
            y: -24
            text: ""
            text_font: font_home_small
            text_color: 0xC8C8C8
        - label:
            id: home_outdoor
            align: BOTTOM_RIGHT
            x: -12
            y: -24
            text: ""
            text_font: font_home_small
            text_color: 0xC8C8C8

        # Tap anywhere to swap to the other idle screen (the character, if one is
        # installed). This is a UI action, not tap-to-talk - the assistant still
        # starts from the button under the screen, so nothing here competes with
        # it. Last in the list, so it sits above the labels.
        - button:
            id: home_tap
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - script.execute: toggle_idle_screen
