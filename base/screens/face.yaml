###############################################################################
# Animated robot face.
#
# A static image is the robot; the eyes and mouth are LVGL rectangles drawn on
# top and reshaped in place. Nothing redraws the background, so a blink costs
# two small rectangles rather than a full-screen 320x240 repaint - which matters
# on this board, where the log already warns about LVGL operations near 90 ms.
#
# Point `face_background_file` at artwork WITHOUT a face on it and line the
# features up with the geometry substitutions below.
#
# An OPTIONAL package. Add it to your thin config's `files:` list AFTER
# base/core.yaml:
#
#   files:
#     - base/core.yaml
#     - base/screens/face.yaml
#
# It claims the active phases (listening / thinking / replying / error / muted /
# timer). It deliberately does NOT claim idle, so it composes with
# base/screens/home.yaml: clock while nothing is happening, robot while talking.
# To have the robot idle on screen as well, add `idle_page: page_face`.
#
# Expressions
#   idle       blinks twice, then glances right and left, then rests
#   listening  eyes wide, small round mouth
#   thinking   pupils dart side to side, mouth pulled into a dot
#   replying   mouth opens and closes in time with speech
#   timer      alarm colour, wide eyes, open mouth, the whole face shakes
#   muted      eyes shut, mouth a line
#   error      alarm colour, narrowed eyes
###############################################################################

substitutions:
  # Everything below describes a CHARACTER, and every value is overridable by a
  # character package in base/faces/ - see base/faces/README.md. The defaults are
  # Pip, the reference character, so this file works on its own.
  #
  # Artwork behind the face: the robot with its painted-on face removed, so the
  # drawn one has somewhere to live.
  face_background_file: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va/raw/main/base/faces/pip.png

  face_color: '0x3AFAE6'        # eyes and mouth - sampled from the artwork
  face_alarm_color: '0xFF4D4D'  # timer ringing, and errors
  # Usually the same as the eyes, but a character with white cartoon eyes
  # wants a mouth that is not also white.
  face_mouth_color: '0x3AFAE6'

  # Geometry, in pixels from the centre of the 320x240 screen. These are measured
  # off the original illustrations rather than guessed: eyes 19x27 at x +/-42,
  # mouth 25x10, both sitting BELOW centre because the robot's panel is in the
  # lower half of the frame. `face_eye_offset` is centre-to-eye, so the gap
  # between the eyes is twice it.
  # Not every character's face sits in the middle of its frame. This shifts the
  # whole face - eyes, pupils and mouth - sideways to meet the artwork.
  face_center_x: '0'

  face_eye_offset: '42'
  face_eye_y: '36'
  face_eye_w: '20'
  face_eye_h: '28'         # resting
  face_mouth_y: '61'
  face_mouth_w: '26'       # resting
  face_mouth_h: '10'       # resting

  # Per-expression sizes. They are substitutions rather than literals so a
  # character with a bigger or smaller face can rescale its whole range of
  # expression without touching the animation code.
  face_eye_h_wide: '34'    # listening, alarm
  face_eye_h_narrow: '12'  # error
  face_eye_h_shut: '4'     # blink, muted
  face_mouth_open_h: '22'  # talking, open half of the cycle
  face_mouth_small_w: '20' # thinking, muted
  face_mouth_o_w: '20'     # listening: a small round "o"
  face_mouth_o_h: '20'
  face_mouth_alarm_w: '30'
  face_mouth_alarm_h: '24'
  face_mouth_error_w: '18'
  # Pupils. A dark hole in the eye, and the thing that actually looks around:
  # moving a pupil inside a still eye reads far more naturally than sliding the
  # whole eye sideways, which is what this used to do.
  face_pupil_color: '0x0A1A3C'
  face_pupil_w: '9'
  face_pupil_h: '19'
  face_pupil_radius: '5'
  face_pupil_dilate: '4'   # added to both dimensions while listening
  face_pupil_shrink: '3'   # taken off while alarmed or in error
  face_gaze_dx: '6'        # how far the pupil travels inside the eye
  # Idle loop: blink, blink, then glance right and left, then rest. One cycle is
  # this many ticks - 100 x 120 ms is about twelve seconds, slow enough to read
  # as a living face rather than a nervous one.
  #
  # MUST BE GREATER THAN ZERO. A character package may override it, and this is
  # the only divisor in the file that is not a literal: the idle tick takes
  # face_frame modulo this value, so a zero divides by zero on the device rather
  # than failing the build. The glance timings inside assume roughly this scale
  # too - much below about 70 and the blinks collide with the gaze.
  face_idle_cycle: '100'

  # Equal to face_eye_h by default: thinking is carried by the pupils and the
  # narrowed mouth, not by squinting. Set it lower for a character that should
  # visibly screw up its eyes.
  face_eye_h_think: '38'
  face_mouth_think_w: '12' # thinking: the mouth shrinks to a dot
  face_listen_pulse: '4'   # how much the eyes breathe while listening
  face_shake_dx: '4'       # alarm shake amplitude
  face_eye_radius: '10'
  face_mouth_radius: '8'

  # Animation tick. Lower is smoother and costs more redraws; the talking mouth
  # opens and closes on alternate ticks, so 120 ms reads as natural speech.
  face_tick: 120ms

  # Claim the phases where the robot should be on screen. Idle is left alone on
  # purpose - see the header.
  listening_page: page_face
  thinking_page: page_face
  replying_page: page_face
  error_page: page_face
  muted_page: page_face
  timer_page: page_face

esphome:
  on_boot:
    - priority: 800
      then:
        - logger.log:
            level: INFO
            format: "package: screens/face.yaml (animated face, tick ${face_tick})"

globals:
  - id: face_frame
    type: int
    restore_value: false
    initial_value: "0"
  # Which expression the widgets are currently wearing. Static parts (colour,
  # resting shape) are only re-applied when this changes, so a still face costs
  # nothing per tick.
  # Whether the pupils are currently visible. Shared by face_pupils and
  # face_pupils_hide so neither has to touch the HIDDEN flag when it is already
  # in the state it wants.
  - id: face_pupils_shown
    type: bool
    restore_value: false
    initial_value: "true"
  # Whether the face is currently painted in the alarm colour. Starts false
  # because the widgets are defined in the normal colour on the page itself, so
  # the very first tint_normal has genuinely nothing to do.
  - id: face_alarm_tint
    type: bool
    restore_value: false
    initial_value: "false"
  - id: face_expr
    type: int
    restore_value: false
    initial_value: "0"

script:
  # --- primitives ----------------------------------------------------------
  - id: face_eyes
    parameters:
      w: int
      h: int
      dx: int
    then:
      # Writes only what moved. These scripts are called every tick in the
      # animated phases, almost always with the SAME arguments: in thinking the
      # width and height are compile-time constants and only the gaze changes,
      # and the timer shake rewrites twelve properties per tick to move two eyes
      # sideways. Each lv_obj_set_* marks the object dirty and invalidates both
      # the old and the new area, so writing an unchanged value is not free.
      - lambda: |-
          static int p_w = -1, p_h = -1, p_dx = 0x7FFFFFFF;
          // Width and height are tested SEPARATELY, because in the phases that
          // run every tick only one of them moves. Listening pulses the height
          // against a width that is a compile-time constant; testing them
          // together meant two pointless lv_obj_set_width calls on every frame
          // of the longest phases, each one dirtying the object and invalidating
          // its old and new area.
          if (w != p_w) {
            lv_obj_set_width(id(face_eye_l), w);
            lv_obj_set_width(id(face_eye_r), w);
          }
          if (h != p_h) {
            lv_obj_set_height(id(face_eye_l), h);
            lv_obj_set_height(id(face_eye_r), h);
          }
          if (dx != p_dx) {
            lv_obj_set_x(id(face_eye_l), ${face_center_x} + dx - ${face_eye_offset});
            lv_obj_set_x(id(face_eye_r), ${face_center_x} + dx + ${face_eye_offset});
          }
          p_w = w; p_h = h; p_dx = dx;

  # Pupils move independently of the eyes: `gx` is the gaze, measured inside the
  # eye, not a shift of the whole face.
  - id: face_pupils
    parameters:
      w: int
      h: int
      gx: int
    then:
      - lambda: |-
          static int p_w = -1, p_h = -1, p_gx = 0x7FFFFFFF;
          // Showing was unconditional: lv_obj_clear_flag invalidates whether or
          // not the flag actually changed, so this was two extra full-object
          // invalidations per tick in thinking and in the timer alarm.
          if (!id(face_pupils_shown)) {
            lv_obj_clear_flag(id(face_pupil_l), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(face_pupil_r), LV_OBJ_FLAG_HIDDEN);
            id(face_pupils_shown) = true;
          }
          // Separately, same reasoning as the eyes above: the phases that run
          // every tick move one dimension, not both.
          if (w != p_w) {
            lv_obj_set_width(id(face_pupil_l), w);
            lv_obj_set_width(id(face_pupil_r), w);
          }
          if (h != p_h) {
            lv_obj_set_height(id(face_pupil_l), h);
            lv_obj_set_height(id(face_pupil_r), h);
          }
          if (gx != p_gx) {
            lv_obj_set_x(id(face_pupil_l), ${face_center_x} + gx - ${face_eye_offset});
            lv_obj_set_x(id(face_pupil_r), ${face_center_x} + gx + ${face_eye_offset});
          }
          p_w = w; p_h = h; p_gx = gx;

  # A squashed eye has no room for a pupil - it would poke out of the slit.
  - id: face_pupils_hide
    then:
      - lambda: |-
          if (!id(face_pupils_shown)) return;
          lv_obj_add_flag(id(face_pupil_l), LV_OBJ_FLAG_HIDDEN);
          lv_obj_add_flag(id(face_pupil_r), LV_OBJ_FLAG_HIDDEN);
          id(face_pupils_shown) = false;

  - id: face_mouth
    parameters:
      w: int
      h: int
      dx: int
    then:
      - lambda: |-
          static int p_w = -1, p_h = -1, p_dx = 0x7FFFFFFF;
          // Separately, and this is the one that matters most. Replying is the
          // longest animated phase and it changes the mouth HEIGHT every tick
          // against a fixed width, so testing the pair together wrote a width
          // nobody asked for 8.3 times a second for the whole of every answer.
          if (w != p_w) {
            lv_obj_set_width(id(face_mouth_obj), w);
          }
          if (h != p_h) {
            lv_obj_set_height(id(face_mouth_obj), h);
          }
          if (dx != p_dx) {
            lv_obj_set_x(id(face_mouth_obj), ${face_center_x} + dx);
          }
          p_w = w; p_h = h; p_dx = dx;

  # Colours are literal rather than templated: three tiny actions beat trusting
  # a lambda to produce an lv_color_t.
  #
  # BOTH ARE GUARDED, because the colour almost never actually changes. It goes
  # red for the alarm and for an error, and back afterwards - that is all. Every
  # other call repaints the same colour it already had, and lvgl.widget.update
  # never compares: it sets the style property, refreshes the style and
  # invalidates the object, three times over. Those calls sit on the expression
  # changes, which is exactly when the audio pipeline is busiest and LVGL is
  # already being warned about for taking too long. The rest of this file makes
  # a point of skipping unchanged writes; this was the piece that did not.
  - id: face_tint_normal
    then:
      - if:
          condition:
            lambda: return id(face_alarm_tint);
          then:
            - lambda: id(face_alarm_tint) = false;
            - lvgl.widget.update:
                id: face_eye_l
                bg_color: ${face_color}
            - lvgl.widget.update:
                id: face_eye_r
                bg_color: ${face_color}
            - lvgl.widget.update:
                id: face_mouth_obj
                bg_color: ${face_mouth_color}
  - id: face_tint_alarm
    then:
      - if:
          condition:
            lambda: return !id(face_alarm_tint);
          then:
            - lambda: id(face_alarm_tint) = true;
            - lvgl.widget.update:
                id: face_eye_l
                bg_color: ${face_alarm_color}
            - lvgl.widget.update:
                id: face_eye_r
                bg_color: ${face_alarm_color}
            - lvgl.widget.update:
                id: face_mouth_obj
                bg_color: ${face_alarm_color}

  # A blink is a squash and a restore. `mode: single` so overlapping ticks
  # cannot leave the eyes shut.
  - id: face_blink
    mode: single
    then:
      - script.execute: face_pupils_hide
      - script.execute:
          id: face_eyes
          w: ${face_eye_w}
          h: ${face_eye_h_shut}
          dx: 0
      - delay: 120ms
      # ONLY re-open if we are still idle. `mode: single` stops this script
      # overlapping itself, but nothing stopped its tail landing after the phase
      # had changed. That was harmless in the animated phases, which overwrite
      # the eyes on the next tick - but muted and error apply their shape exactly
      # once, on entry. A blink that began in idle and finished after the mic was
      # muted re-opened the eyes and put the pupils back, and since the muted
      # branch had already run, nothing ever corrected it: the face sat there
      # wide awake, supposedly muted, until the phase changed again.
      - if:
          condition:
            lambda: return id(face_expr) == 1;
          then:
            - script.execute:
                id: face_eyes
                w: ${face_eye_w}
                h: ${face_eye_h}
                dx: 0
            - script.execute:
                id: face_pupils
                w: ${face_pupil_w}
                h: ${face_pupil_h}
                gx: 0

  # --- the driver ----------------------------------------------------------
  # One tick: work out which expression the current phase wants, apply its
  # resting shape if it just changed, then animate whatever moves.
  - id: face_tick_script
    mode: single
    then:
      # Wrapped at a multiple of the idle cycle: left free-running it would
      # eventually cost the animation its float precision.
      - lambda: id(face_frame) = (id(face_frame) + 1) % (${face_idle_cycle} * 360);

      # IDLE - open eyes, pupils centred, an occasional blink.
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(face_expr) != 1;
                then:
                  - lambda: id(face_expr) = 1;
                  - script.execute: face_tint_normal
                  - script.execute:
                      id: face_eyes
                      w: ${face_eye_w}
                      h: ${face_eye_h}
                      dx: 0
                  - script.execute:
                      id: face_pupils
                      w: ${face_pupil_w}
                      h: ${face_pupil_h}
                      gx: 0
                  - script.execute:
                      id: face_mouth
                      w: ${face_mouth_w}
                      h: ${face_mouth_h}
                      dx: 0
            # Two blinks close together, a pause, then the eyes wander right and
            # left and settle. The pupils do the wandering; the blink script
            # re-centres them when it finishes, so the two never fight.
            - if:
                condition:
                  lambda: |-
                    const int t = id(face_frame) % ${face_idle_cycle};
                    return t == 0 || t == 5;
                then:
                  - script.execute: face_blink
            # Gaze from a RANGE, not from equality on one frame, so that the gaze
            # is a STATE the tick keeps restoring rather than an event that has to
            # land. Anything else that moves the pupils - the blink recentring
            # them on its way out - is corrected on the next tick instead of
            # leaving them parked off to one side for the rest of the cycle.
            #
            # The original note here claimed equality was unsafe because a missed
            # interval tick is skipped rather than deferred, so `t == 40` might
            # never happen. That reasoning is WRONG and worth correcting before it
            # spreads: face_frame is incremented in exactly one place, inside this
            # script, so a tick that never runs does not advance it and no value
            # of t can be stepped over. The blink just above still keys off
            # equality and is perfectly correct.
            #
            # Calling this every tick is free now that face_pupils only writes on
            # a change; the guard is just to keep out of the blink's way.
            - if:
                condition:
                  not:
                    script.is_running: face_blink
                then:
                  - script.execute:
                      id: face_pupils
                      w: ${face_pupil_w}
                      h: ${face_pupil_h}
                      gx: !lambda |-
                        const int t = id(face_frame) % ${face_idle_cycle};
                        const int g = (${face_gaze_dx} * 2) / 3;
                        if (t >= 30 && t < 40) return g;
                        if (t >= 50 && t < 60) return -g;
                        return 0;

      # LISTENING - eyes wide and breathing, pupils dilated, small round mouth.
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_listening_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(face_expr) != 2;
                then:
                  - lambda: id(face_expr) = 2;
                  - script.stop: face_blink
                  - script.execute: face_tint_normal
                  - script.execute:
                      id: face_pupils
                      w: !lambda return ${face_pupil_w} + ${face_pupil_dilate};
                      h: !lambda return ${face_pupil_h} + ${face_pupil_dilate};
                      gx: 0
                  - script.execute:
                      id: face_mouth
                      w: ${face_mouth_o_w}
                      h: ${face_mouth_o_h}
                      dx: 0
            - script.execute:
                id: face_eyes
                w: ${face_eye_w}
                h: !lambda |-
                  static const int PULSE[] = {0, ${face_listen_pulse} / 2, ${face_listen_pulse}, ${face_listen_pulse} / 2};
                  return ${face_eye_h_wide} + PULSE[(id(face_frame) / 2) % 4];
                dx: 0

      # THINKING - the PUPILS look around; the eyes stay at their resting size.
      # Sliding whole eyes sideways, which is what this used to do, reads as the
      # face being dragged rather than as thought.
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_thinking_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(face_expr) != 3;
                then:
                  - lambda: id(face_expr) = 3;
                  - script.stop: face_blink
                  - script.execute: face_tint_normal
                  - script.execute:
                      id: face_eyes
                      w: ${face_eye_w}
                      h: ${face_eye_h_think}
                      dx: 0
                  - script.execute:
                      id: face_mouth
                      w: ${face_mouth_think_w}
                      h: ${face_mouth_h}
                      dx: 0
            - script.execute:
                id: face_pupils
                w: ${face_pupil_w}
                h: ${face_pupil_h}
                gx: !lambda |-
                  return ((id(face_frame) / 3) % 2) ? ${face_gaze_dx} : -${face_gaze_dx};

      # REPLYING - the mouth does the talking.
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_replying_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(face_expr) != 4;
                then:
                  - lambda: id(face_expr) = 4;
                  - script.stop: face_blink
                  - script.execute: face_tint_normal
                  - script.execute:
                      id: face_eyes
                      w: ${face_eye_w}
                      h: ${face_eye_h}
                      dx: 0
                  - script.execute:
                      id: face_pupils
                      w: ${face_pupil_w}
                      h: ${face_pupil_h}
                      gx: 0
            - script.execute:
                id: face_mouth
                w: ${face_mouth_w}
                h: !lambda |-
                  return (id(face_frame) % 2) ? ${face_mouth_open_h} : ${face_mouth_h};
                dx: 0

      # TIMER RINGING - alarm colour, wide eyes, pinprick pupils, shaking.
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_timer_finished_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(face_expr) != 5;
                then:
                  - lambda: id(face_expr) = 5;
                  - script.stop: face_blink
                  - script.execute: face_tint_alarm
                  - script.execute:
                      id: face_mouth
                      w: ${face_mouth_alarm_w}
                      h: ${face_mouth_alarm_h}
                      dx: 0
            - script.execute:
                id: face_eyes
                w: ${face_eye_w}
                h: ${face_eye_h_wide}
                dx: !lambda |-
                  return (id(face_frame) % 2) ? ${face_shake_dx} : -${face_shake_dx};
            - script.execute:
                id: face_pupils
                w: !lambda return ${face_pupil_w} - ${face_pupil_shrink};
                h: !lambda return ${face_pupil_h} - ${face_pupil_shrink};
                gx: !lambda |-
                  return (id(face_frame) % 2) ? ${face_shake_dx} : -${face_shake_dx};

      # MUTED - eyes shut. A slit has no room for a pupil.
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(face_expr) != 6;
                then:
                  - lambda: id(face_expr) = 6;
                  - script.stop: face_blink
                  - script.execute: face_tint_normal
                  - script.execute: face_pupils_hide
                  - script.execute:
                      id: face_eyes
                      w: ${face_eye_w}
                      h: ${face_eye_h_shut}
                      dx: 0
                  - script.execute:
                      id: face_mouth
                      w: ${face_mouth_small_w}
                      h: ${face_mouth_h}
                      dx: 0

      # ERROR - narrowed eyes, shrunken pupils, alarm colour.
      - if:
          condition:
            lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
          then:
            - if:
                condition:
                  lambda: return id(face_expr) != 7;
                then:
                  - lambda: id(face_expr) = 7;
                  - script.stop: face_blink
                  - script.execute: face_tint_alarm
                  - script.execute:
                      id: face_eyes
                      w: ${face_eye_w}
                      h: ${face_eye_h_narrow}
                      dx: 0
                  - script.execute:
                      id: face_pupils
                      w: !lambda return ${face_pupil_w} - ${face_pupil_shrink};
                      h: !lambda return ${face_pupil_h} - ${face_pupil_shrink};
                      gx: 0
                  - script.execute:
                      id: face_mouth
                      w: ${face_mouth_error_w}
                      h: ${face_mouth_h}
                      dx: 0

# Only animate while the face is actually on screen - on the home screen this
# costs nothing.
interval:
  - interval: ${face_tick}
    then:
      - if:
          condition:
            lvgl.page.is_showing: page_face
          then:
            - script.execute: face_tick_script

image:
  # `platform: file` rather than a bare entry: the old top-level form is
  # deprecated and goes away in ESPHome 2027.1.0. This is why the core requires
  # 2026.7.0 - the platform syntax landed exactly there.
  - platform: file
    id: face_bg
    file: ${face_background_file}
    resize: 320x240
    type: RGB565
    # NO `transparency:` on purpose. Every character PNG in this repo is fully
    # opaque - checked, alpha is 255 everywhere - and this image covers the whole
    # screen anyway. Declaring an alpha channel costs on every single redraw:
    # LVGL loses the straight blit and blends the background per pixel inside
    # each dirty rect, which here means each eye, pupil and mouth, every tick.
    # It also carries the alpha plane in flash for nothing.

lvgl:
  pages:
    - id: page_face
      bg_color: 0x000000
      widgets:
        - image:
            src: face_bg
            align: CENTER

        - obj:
            id: face_eye_l
            align: CENTER
            x: -${face_eye_offset}
            y: ${face_eye_y}
            width: ${face_eye_w}
            height: ${face_eye_h}
            radius: ${face_eye_radius}
            bg_color: ${face_color}
            bg_opa: COVER
            border_width: 0
            pad_all: 0
        - obj:
            id: face_eye_r
            align: CENTER
            x: ${face_eye_offset}
            y: ${face_eye_y}
            width: ${face_eye_w}
            height: ${face_eye_h}
            radius: ${face_eye_radius}
            bg_color: ${face_color}
            bg_opa: COVER
            border_width: 0
            pad_all: 0
        - obj:
            id: face_pupil_l
            align: CENTER
            x: -${face_eye_offset}
            y: ${face_eye_y}
            width: ${face_pupil_w}
            height: ${face_pupil_h}
            radius: ${face_pupil_radius}
            bg_color: ${face_pupil_color}
            bg_opa: COVER
            border_width: 0
            pad_all: 0
        - obj:
            id: face_pupil_r
            align: CENTER
            x: ${face_eye_offset}
            y: ${face_eye_y}
            width: ${face_pupil_w}
            height: ${face_pupil_h}
            radius: ${face_pupil_radius}
            bg_color: ${face_pupil_color}
            bg_opa: COVER
            border_width: 0
            pad_all: 0

        - obj:
            id: face_mouth_obj
            align: CENTER
            x: 0
            y: ${face_mouth_y}
            width: ${face_mouth_w}
            height: ${face_mouth_h}
            radius: ${face_mouth_radius}
            bg_color: ${face_mouth_color}
            bg_opa: COVER
            border_width: 0
            pad_all: 0

        # A tap means different things depending on what the face is doing:
        # silence a ringing timer, or - when it is merely idling - swap back to
        # the other idle screen. During a pipeline it does nothing, so a stray
        # touch while the assistant is listening cannot derail it.
        - button:
            id: face_tap
            width: 100%
            height: 100%
            bg_opa: TRANSP
            border_width: 0
            shadow_width: 0
            on_click:
              - if:
                  condition:
                    switch.is_on: timer_ringing
                  then:
                    - switch.turn_off: timer_ringing
                  else:
                    - if:
                        condition:
                          lambda: return id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
                        then:
                          - script.execute: toggle_idle_screen
