###############################################################################
# ESP32-S3-BOX-3 - Home Assistant voice assistant (core)
#
# Always-on core: ES8311 DAC + speaker, ES7210 dual-mic ADC, on-device wake word
# (micro_wake_word), the full HA Assist pipeline, voice timers, and an LVGL UI on
# the 320x240 panel driven by the GT911 capacitive touchscreen.
#
# WHY LVGL AND NOT THE UPSTREAM CASITA CONFIG
# esphome/wake-word-voice-assistants paints the S3-Box-3 with `display:` +
# `pages:` + full-screen PNGs, and never touches the touch panel. LVGL and
# `display: pages:` are mutually exclusive, so this core replaces that layer
# rather than extending it: the same phases, but as LVGL pages with a real
# touchscreen underneath to build on. The full-screen illustrations that came
# with the port are gone; a character package draws the phases now.
#
# HOW TTS IS ROUTED
# `voice_assistant:` has a `media_player:`, so ESPHome plays the TTS URL itself at
# TTS_END (voice_assistant.cpp: `media_player_->make_call().set_media_url(url)`).
# That attachment is not only about audio: `get_feature_flags()` only advertises
# ANNOUNCE when a media player is present, and Home Assistant only asks a
# satellite for its configuration - the wake word list - inside
# `if feature_flags & ANNOUNCE`. No media player therefore means no wake word
# picker in HA and a satellite that never returns to `idle`.
#
# The cost is that a long reply is downloaded and decoded on the device, which is
# the suspected cause of mid-answer reboots. So when `TTS output` is `External
# player`, `on_tts_end` cancels that local playback the moment it starts: the
# external speaker gets the URL and the box stops fetching it.
#
# Pinout and hardware notes: docs/HARDWARE.md.
###############################################################################

substitutions:
  name: esp32-s3-box-3-va
  friendly_name: "S3 Box 3 Voice"

  # ---------------------------------------------------------------------------
  # Voice assistant phases - drive which LVGL page is shown (see draw_display)
  # ---------------------------------------------------------------------------
  voice_assist_idle_phase_id: '1'            # ready, waiting for a wake word
  voice_assist_listening_phase_id: '2'       # woken, recording the command
  voice_assist_thinking_phase_id: '3'        # STT / LLM running
  voice_assist_replying_phase_id: '4'        # TTS playing
  voice_assist_not_ready_phase_id: '10'      # no HA connection
  voice_assist_error_phase_id: '11'          # pipeline error
  voice_assist_muted_phase_id: '12'          # microphone muted
  voice_assist_timer_finished_phase_id: '20' # a timer is ringing

  # ---------------------------------------------------------------------------
  # Pins - ESP32-S3-BOX-3 (docs/HARDWARE.md). Do not change unless you are
  # porting to another board. GPIO0/3/45/46 are strapping pins, hence the
  # ignore_strapping_warning flags below.
  # ---------------------------------------------------------------------------
  i2c_sda: GPIO8            # shared: ES7210 + ES8311 + GT911
  i2c_scl: GPIO18
  lcd_clk: GPIO7
  lcd_mosi: GPIO6
  lcd_cs: GPIO5
  lcd_dc: GPIO4
  lcd_reset: GPIO48         # active low; also resets the GT911 (shared net)
  lcd_backlight: GPIO47
  touch_int: GPIO3
  i2s_mclk: GPIO2
  i2s_bclk: GPIO17
  i2s_lrclk: GPIO45
  i2s_dout: GPIO15          # ESP -> ES8311 (speaker out)
  i2s_din: GPIO16           # ES7210 -> ESP (mic in)
  amp_enable: GPIO46        # speaker power amplifier, active high
  top_button: GPIO0         # the button on the top face

  # ---------------------------------------------------------------------------
  # Home Assistant / network
  # ---------------------------------------------------------------------------
  hidden_ssid: 'false'      # true = fast_connect, required for a hidden SSID

  # Media player volume clamps for the onboard speaker.
  volume_min: '0.5'
  volume_max: '0.8'

  # The timer alarm. Fetched at COMPILE time and baked into flash as a byte
  # array, so it needs no network at ring time and always comes out of the box's
  # own speaker, whatever `TTS output` is set to. Any URL or local path;
  # MP3/FLAC/WAV all decode.
  #
  # Ships with this repo (48 kHz mono 16-bit, 2.73 s, 85 KB - the exact format
  # the announcement pipeline runs at, so nothing is resampled). It is a copy of
  # Home Assistant Voice PE's timer_finished.flac, vendored deliberately: the
  # original lives on that project's `dev` branch, where it can move or change
  # and break a build here without anything changing on our side.
  timer_finished_sound_file: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va/raw/main/base/sounds/timer_finished.flac

  # Played when the wake word fires, if the "Wake sound" switch is on. 180 ms on
  # purpose: the microphone and speaker share one I2S bus on this board, so the
  # beep has to finish BEFORE listening starts. Home Assistant Voice PE's own
  # wake sound is 0.95 s, which would put nearly a second between the wake word
  # and the assistant hearing anything.
  wake_sound_file: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va/raw/main/base/sounds/wake.wav

  # Input gain for the wake word only (1-64). See the micro_wake_word block for
  # why this exists and why it is not 1.
  mww_gain_factor: '4'

  # Wake word tuning. The cutoff is compared against the average probability over
  # the sliding window, NOT the peak - which is why the window size matters more
  # than it looks. Measured on an S3-Box-3: the peak hits 1.00 on every single
  # utterance, but averaged over the stock 5 windows it lands around 0.6, because
  # the quiet frames either side of the word dilute it. The stock 0.90 cutoff is
  # therefore unreachable here. A shorter window keeps the peak frames and drops
  # the padding, which buys back enough headroom to run a selective cutoff.
  #
  # If the wake word starts getting missed, lower the cutoff before widening the
  # window. If it fires at random kitchen noise, raise the cutoff.
  # Measured on hardware with window 3: averages of 0.71 0.71 0.80 0.86 0.89 0.94.
  # The cutoff sits below the weakest of those with room to spare, because a
  # near miss logs NOTHING - a threshold that only just clears the observed
  # samples silently drops the ones you never see.
  alexa_probability_cutoff: '0.6'
  alexa_sliding_window: '3'
  okay_nabu_probability_cutoff: '0.7'
  okay_nabu_sliding_window: '3'
  hey_jarvis_probability_cutoff: '0.7'
  hey_jarvis_sliding_window: '3'

  # ---------------------------------------------------------------------------
  # TTS routing (see the header). `tts_output_default` picks the boot default of
  # the "TTS output" select; the user can change it live in HA.
  #   "This device"     - the box speaks (upstream behaviour)
  #   "External player" - only ${external_media_player_id} speaks
  #   "Both"            - both, at the cost of the local decode
  # ---------------------------------------------------------------------------
  external_media_player_id: media_player.living_room
  tts_output_default: "This device"

  # When TTS plays on an external speaker the box hands over a URL and hears
  # nothing back, so it has no idea how long the reply lasts - the pipeline ends
  # in about half a second while the speaker talks on. Anything driven by the
  # assistant's state (an animated face, a light) would blink and stop.
  #
  # So estimate it from the text: hold the replying phase for a base delay plus
  # this much per character. 70 ms/char is roughly conversational speech; raise
  # it if the animation finishes early, lower it if it runs long. The cap stops a
  # runaway estimate holding the device forever.
  # A cast speaker does not start the instant it is handed a URL - there is a
  # second or so of buffering, during which the box is already animating. This is
  # added to the hold so the mouth is still moving when the speaker finishes,
  # rather than stopping early by exactly that lag.
  # How long to wait for the external speaker to actually start before
  # giving up on it. Only used when its state is visible.
  tts_wait_start_ms: '4000'
  tts_hold_lead_ms: '1200'
  tts_hold_base_ms: '700'
  tts_hold_ms_per_char: '70'
  # THE CAP, NOT THE RATE, IS WHAT CUTS A LONG REPLY SHORT. At 70 ms per
  # character a 450-character Polish answer is about 31 seconds of speech, so a
  # 30 second cap expired mid-sentence: the face stopped talking and the idle
  # clock came up while the speaker was still going. That is the whole of the
  # "it switched to the clock and kept answering" report of 2026-07-20.
  # Raising the cap costs listening time, because the wake word is deliberately
  # held off until the hold ends - with the reply coming out of a speaker in the
  # same room, letting the microphone open early invites the box to hear itself.
  # So this is a ceiling for genuinely long answers, not a schedule: ordinary
  # ones finish on the per-character estimate long before it.
  tts_hold_max_ms: '60000'


  # Bare-core screen text. Overridable by a language package like everything
  # else the UI says - see base/lang/README.md.
  # UI accent, used by the boot animation. A character package normally sets the
  # tone for everything else on screen; this is what the core uses before any
  # such package is even on screen.
  accent_color: '0x3AFAE6'
  boot_tick: 150ms

  # Backlight behaviour at boot - see the `Screen` light below.
  screen_restore_mode: ALWAYS_ON

  # Boot dot colours. Any number of 0xRRGGBB entries; the animation cross-fades
  # between consecutive ones and wraps around, and each dot starts at a different
  # point in the cycle so they are never the same colour at once.
  boot_palette: '0x3AFAE6, 0x4FA8FF, 0x9B6BFF, 0xFF6BC8, 0xFFB347, 0x5CFF9E'
  boot_fade_steps: '6'     # ticks per colour; 6 x boot_tick = 900 ms per hue

  text_starting: "Starting..."
  text_no_wifi: "No Wi-Fi"
  text_no_ha: "No Home Assistant"
  status_idle: "Ready"
  status_listening: "Listening"
  status_thinking: "Thinking"
  status_replying: "Speaking"
  status_error: "Error"
  status_muted: "Microphone muted"
  status_timer: "Timer"

  # Which page each assistant phase shows. The default is the plain text status
  # page, which is the floor rather than the intended look;
  # a screen package claims a phase by pointing its substitution elsewhere -
  # `base/screens/home.yaml` takes the idle one, `base/screens/face.yaml` takes
  # the active ones. Boot / no-Wi-Fi / no-HA stay fixed: they have to work before
  # any optional screen is up.
  idle_page: page_status
  # Tapping the idle screen swaps between these two. Point them at a clock and a
  # character and the tap becomes "show me the robot" / "show me the time".
  # Leave them equal and tapping does nothing.
  idle_page_alt: page_status
  # SWIPE NEIGHBOURS of the idle screen. Home sits in the middle of a cross:
  #
  #                    ${idle_page_above}
  #                          |
  #   ${idle_page_side} -- home -- ${idle_page_side}      (carousel, wraps)
  #                          |
  #                   ${idle_page_below}
  #
  # Vertical is one level deep and not a loop: swiping up from home brings the
  # screen in from the bottom, and swiping down takes you back. Horizontal wraps
  # like a carousel. Left at `page_status` these all collapse onto the same page,
  # so swiping does nothing and nothing breaks - which is what a config without
  # `base/screens/swipe.yaml` gets.
  idle_page_above: page_status
  idle_page_below: page_status
  idle_page_side: page_status
  # HOW HARD YOU HAVE TO SWIPE. LVGL wants 50 px of travel and 3 px of velocity
  # at release before it calls something a gesture. On a 320 px screen 50 px is a
  # sixth of the width, which is enough that deliberate swipes get dropped -
  # reported on hardware 2026-07-22. 28 px is a little over a fingertip and lands
  # far short of anything anyone would consider a tap.
  #
  # Raise `swipe_min_px` if taps start being read as swipes; lower it if swipes
  # get missed. These are applied at boot through the LVGL runtime API rather
  # than as build flags, because LVGL defines its defaults without an #ifndef
  # guard and a -D would be a redefinition rather than an override.
  swipe_min_px: '28'
  swipe_min_velocity: '2'

  # HOW THE SWIPE ANIMATES, and the honest position on it: a smooth slide is not
  # available on this hardware. A full screen is 320*240*2 = 153,600 bytes, so at
  # the panel's 40 MHz the transfer alone is 30.7 ms before anything is drawn,
  # and `buffer_size: 25%` sends it in four passes. `MOVE_*` slides BOTH screens,
  # so every frame composites two of them. That caps a 250 ms slide at about
  # eight frames, and it judders - reported on hardware 2026-07-22.
  #
  # Raising the SPI clock was the one lever that would have changed this and it
  # is closed: 80 MHz gives a blank white panel on this controller.
  #
  # So this is a taste setting, not a tuning knob:
  #   MOVE_*  both screens slide - the most direct feel, the most work
  #   OVER_*  the new screen slides over a stationary old one - less to composite
  #   NONE    instant, no animation at all, and no judder to look at
  # `swipe_anim_ms` is ignored when the animation is NONE.
  # OVER rather than MOVE, chosen on hardware: MOVE composites two full screens
  # every frame and visibly juddered, OVER leaves the old one still and only
  # slides the incoming page over it.
  swipe_anim_TOP: OVER_TOP
  swipe_anim_BOTTOM: OVER_BOTTOM
  swipe_anim_LEFT: OVER_LEFT
  swipe_anim_RIGHT: OVER_RIGHT
  swipe_anim_ms: '180'
  listening_page: page_status
  thinking_page: page_status
  replying_page: page_status
  error_page: page_status
  muted_page: page_status
  timer_page: page_status


  # ---------------------------------------------------------------------------
  # Fonts. Every character the assistant may print must be covered by the
  # glyphset or listed in `extra_glyphs`, or it renders blank.
  #
  # GF_Latin_Core is broader than its name suggests: 319 glyphs, covering Western
  # AND Central European Latin. Polish, Czech, Hungarian, Turkish accents are all
  # in there already, so `extra_glyphs` is usually unnecessary - here it only adds
  # the superscripts for m² / m³, which Core happens to lack.
  #
  # Do NOT "upgrade" this to GF_Latin_Plus or GF_Latin_Beyond. The Google Fonts
  # glyphsets are increments, not supersets: Plus is 110 glyphs and Beyond 134,
  # and neither contains the Central European accents. Swapping Core for Plus
  # removes them. To extend coverage, list both.
  # ---------------------------------------------------------------------------
  font_family: Figtree
  font_glyphsets: "GF_Latin_Core"
  extra_glyphs: "²³"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  # 2026.7.0 is where `image:` became a platform component; the screen packages
  # use that syntax, and the old one is removed in 2027.1.0.
  min_version: 2026.7.0
  name_add_mac_suffix: false
  # List form, not a bare mapping: screen packages add their own on_boot, and
  # ESPHome appends lists while two mappings under one key would collide.
  on_boot:
    # Gesture thresholds, applied to the touchscreen input device. Priority 250
    # so LVGL has finished registering it - at 600 there is no indev to find yet.
    # Guarded on the pointer, so a build with no touchscreen skips it rather than
    # dereferencing null.
    - priority: 250
      then:
        - lambda: |-
            lv_indev_t *indev = lv_indev_get_next(NULL);
            while (indev != NULL) {
              lv_indev_set_gesture_min_distance(indev, ${swipe_min_px});
              lv_indev_set_gesture_min_velocity(indev, ${swipe_min_velocity});
              indev = lv_indev_get_next(indev);
            }
    - priority: 600
      then:
        - script.execute: draw_display
        # If HA never shows up, stop pretending we are still booting.
        - delay: 30s
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - script.execute: draw_display

esp32:
  board: esp32s3box
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

# The mipi_spi S3BOX model hard-requires PSRAM, and LVGL's draw buffer lives
# here too.
psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: USB_SERIAL_JTAG

api:
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome
    id: ota_esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: ${hidden_ssid}
  ap:
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:

# HA owns the clock, and the timezone with it. There is deliberately no
# `timezone:` here: ESPHome's Home Assistant time platform defines
# USE_HOMEASSISTANT_TIMEZONE only when the option is ABSENT, and then takes the
# zone from Home Assistant along with the time. Setting a POSIX string here
# would switch that off and pin the device to whatever was compiled in, which is
# the opposite of what you want on a device that already talks to HA.
time:
  - platform: homeassistant
    id: ha_time

###############################################################################
# DISPLAY + TOUCH
#
# The GT911 shares the I2C bus with the two audio codecs, and shares its reset
# net with the LCD (GPIO48). esp-bsp drives no separate touch reset, so neither
# do we: declaring GPIO48 on both components would have them pulse reset against
# each other. Instead the touchscreen inits late (setup_priority) so the
# display's own reset pulse has already brought the GT911 up.
###############################################################################

i2c:
  - id: i2c_bus
    scl: ${i2c_scl}
    sda: ${i2c_sda}

spi:
  - id: spi_bus
    clk_pin: ${lcd_clk}
    mosi_pin: ${lcd_mosi}

display:
  - platform: mipi_spi
    id: s3_box_lcd
    model: S3BOX          # bakes in 320x240, mirror_x/y and BGR - do not re-add
    data_rate: 40MHz
    cs_pin: ${lcd_cs}
    dc_pin: ${lcd_dc}
    reset_pin:
      number: ${lcd_reset}
      inverted: true
    invert_colors: false
    # Both are mandatory under LVGL: LVGL owns the framebuffer and the redraws.
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: gt911
    id: box_touch
    i2c_id: i2c_bus
    setup_priority: -200
    interrupt_pin:
      number: ${touch_int}
      ignore_strapping_warning: true

output:
  - platform: ledc
    pin: ${lcd_backlight}
    id: backlight_output

light:
  - platform: monochromatic
    id: backlight
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    # ALWAYS_ON, not RESTORE_DEFAULT_ON. The latter restores the saved state and
    # only falls back to on, so a screen switched off once from Home Assistant
    # stays off through every reboot afterwards - including the boot screen,
    # which is then invisible exactly when you need it. Set
    # `screen_restore_mode: RESTORE_DEFAULT_OFF` if you would rather the device
    # remember being switched off.
    restore_mode: ${screen_restore_mode}
    default_transition_length: 250ms

###############################################################################
# AUDIO
#
# One I2S bus, the ES7210 capturing at 16 kHz for the wake word and the ES8311
# playing back at 48 kHz. Unlike boards that share clock pins between separate
# ADC/DAC buses, the S3-Box-3 wires both codecs to a single bus, so this is the
# plain stock layout with no master/slave trickery.
###############################################################################

audio_adc:
  - platform: es7210
    i2c_id: i2c_bus
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

audio_dac:
  - platform: es8311
    i2c_id: i2c_bus
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin:
      number: ${i2s_lrclk}
      ignore_strapping_warning: true
    i2s_bclk_pin: ${i2s_bclk}
    i2s_mclk_pin: ${i2s_mclk}

microphone:
  - platform: i2s_audio
    id: box_mic
    i2s_din_pin: ${i2s_din}
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: ${i2s_dout}
    dac_type: external
    audio_dac: es8311_dac
    sample_rate: 48000
    bits_per_sample: 16bit
    channel: left          # the box has a single output channel
    buffer_duration: 100ms

media_player:
  - platform: speaker
    id: speaker_media_player
    name: None
    volume_min: ${volume_min}
    volume_max: ${volume_max}
    announcement_pipeline:
      speaker: box_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1
    files:
      - id: timer_finished_sound
        file: ${timer_finished_sound_file}
      - id: wake_sound
        file: ${wake_sound_file}
    on_announcement:
      # The mic cannot capture while the speaker holds the bus, so drop the wake
      # word for the duration of any announcement.
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
                then:
                  - wait_until:
                      condition:
                        - not:
                            voice_assistant.is_running:
                      timeout: 30s
      # No pipeline running means this is user- or HA-initiated playback, not a
      # reply: show the muted (blank) page while it plays. A ringing timer is the
      # exception - it is an announcement too, and without this guard it would
      # blank the timer-finished screen the moment its own alarm starts playing.
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - switch.is_off: timer_ringing
              - lambda: return !id(wake_sound_active);
              - lambda: return !id(tts_reply_active);
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
            - script.execute: draw_display
    on_idle:
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - lambda: return !id(tts_reply_active);
              # The wake beep ending lands here, milliseconds before the pipeline
              # starts. Without this guard the wake word was restarted into the
              # conversation it had just triggered.
              - lambda: return !id(wake_start_pending);
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display

###############################################################################
# VOICE ASSISTANT
###############################################################################

micro_wake_word:
  id: mww
  # The wake word runs its inference locally on the RAW microphone stream, so it
  # gets none of the `auto_gain` / `volume_multiplier` above - those are sent to
  # Home Assistant and applied there, to the speech-to-text stream only. On a
  # quiet mic that splits the two apart: dictation transcribes perfectly while
  # the wake word never reaches its probability cutoff. `gain_factor` is the knob
  # for it, and 4 is what Home Assistant Voice PE ships. Note that on this board
  # it turned out NOT to be the cause: the wake word behaved identically at 1 and
  # at 4, and what actually fixed it was dropping `vad:` and shortening the
  # sliding window. Kept because the reference hardware ships it, but do not
  # assume raising it will help.
  # Raise it (up to 64) if the wake word needs shouting at, lower it if random
  # kitchen noise starts triggering it.
  microphone:
    microphone: box_mic
    channels: 0
    gain_factor: ${mww_gain_factor}
  # Three models, so Home Assistant offers a choice in its wake word picker: the
  # device reports every model here as an available wake word, and allows one
  # active at a time. Each costs inference per frame, which is the budget the
  # wake word competes for - if detection starts getting flaky after adding a
  # fourth, that is the first thing to suspect.
  #
  # NOTE: `vad:` is currently off. The VAD model gates every detection - a wake
  # word the VAD disagrees with is suppressed - and it is a third network to run
  # per frame. Upstream's S3-Box-3 config does not use it at all. It is off here
  # LEAVE THIS OFF. An earlier comment here invited turning it back on once the
  # wake word worked - do not. `vad:` was part of what broke detection in the
  # first place: together with a long sliding window it kept the running average
  # below the cutoff, so the wake word never fired. Dropping it and shortening
  # the window is what fixed it, and the settings below are the result.
  # vad:

  # Cutoffs are exposed because they are the only way to see how close a wake
  # word is getting: the component logs a detection and its probability, but
  # logs NOTHING for a near miss. Drop the cutoff temporarily and the log starts
  # reporting the actual probabilities, which turns "it doesn't work" into a
  # number. Defaults are the model manifests' own values.
  models:
    - model: alexa
      id: mww_alexa
      probability_cutoff: ${alexa_probability_cutoff}
      sliding_window_size: ${alexa_sliding_window}
    - model: okay_nabu
      id: mww_okay_nabu
      probability_cutoff: ${okay_nabu_probability_cutoff}
      sliding_window_size: ${okay_nabu_sliding_window}
    - model: hey_jarvis
      id: mww_hey_jarvis
      probability_cutoff: ${hey_jarvis_probability_cutoff}
      sliding_window_size: ${hey_jarvis_sliding_window}
  on_wake_word_detected:
    - lambda: id(wake_start_pending) = true;
    # The beep has to finish before the assistant opens the microphone: one I2S
    # bus, so capture and playback cannot overlap. `wait_until` rather than a
    # fixed delay, so a longer replacement sound still works.
    - if:
        condition:
          switch.is_on: wake_sound_enabled
        then:
          - lambda: id(wake_sound_active) = true;
          # WAIT FOR THE MICROPHONE TO LET GO OF THE BUS FIRST. Detection only
          # ASKS the wake word to stop; the component then tears down its
          # inference task, which takes a moment. Playing in that window gives
          # "Parent bus is busy", and the speaker driver then retries after a
          # FULL SECOND - so the beep, and everything behind it, arrives about
          # two seconds late. That reads as the wake word being slow to trigger,
          # which is not what is happening at all.
          - micro_wake_word.stop:
          - wait_until:
              condition:
                not:
                  micro_wake_word.is_running:
              timeout: 1s
          - media_player.speaker.play_on_device_media_file:
              media_file: wake_sound
              announcement: true
          - wait_until:
              condition:
                media_player.is_announcing:
              timeout: 300ms
          - wait_until:
              condition:
                not:
                  media_player.is_announcing:
              timeout: 3s
          - lambda: id(wake_sound_active) = false;
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
    - lambda: id(wake_start_pending) = false;

voice_assistant:
  id: va
  microphone: box_mic
  micro_wake_word: mww
  # See the header: this is what makes Home Assistant offer the wake word picker
  # and lets the satellite entity leave `responding`.
  media_player: speaker_media_player
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: "..."
    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
  on_stt_end:
    # FREE THE I2S BUS FOR THE REPLY, HERE, THIS EARLY.
    #
    # The wake word keeps running for the whole conversation, and it holds the
    # microphone - and so the single I2S bus. When the reply URL arrives,
    # ESPHome starts playing it immediately, hits "Parent bus is busy", and the
    # speaker driver then retries a FULL SECOND later, leaving the device deaf
    # for about two and a half seconds after every answer.
    #
    # This was first tried at on_tts_start and did NOT work: TTS_START and
    # TTS_END are about SIX MILLISECONDS apart, and `wait_until` does not block
    # the pipeline, so playback began long before the wake word had finished
    # tearing down its inference task. Speech-to-text ending is roughly two
    # seconds before the reply, which is ample - so no wait is needed here, only
    # a head start.
    - micro_wake_word.stop:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
  on_tts_start:
    - lambda: |-
        id(tts_chars) = x.length();
        id(tts_started_ms) = millis();
        id(tts_reply_active) = true;
    # CUT THE AMPLIFIER for an External-player reply. The box downloads and
    # decodes every reply whatever the routing says, because `voice_assistant:`
    # has to keep its `media_player:` - without one Home Assistant stops offering
    # a wake word picker and the satellite never returns to idle. So "External
    # player" means the answer comes out of BOTH speakers, which is measurable:
    # `media_player.<device>` goes to `playing` for the length of every reply.
    #
    # Cancelling the local playback does not work. The fetch alone was measured at
    # sixteen seconds, a stop issued during it is discarded, and a forty-five
    # second retry loop killed nothing.
    #
    # This kills the SOUND rather than the playback: GPIO46 is the amplifier
    # enable line, so the decode continues untouched and the room just does not
    # hear it. Deliberately NOT `speaker.mute_on` - that was tried on 2026-07-22
    # and the next pipeline hung in `listening` and never came out. The mechanism
    # was never understood, so the codec is left alone entirely.
    #
    # Three paths switch it back on and two of them are unconditional; a stuck
    # amplifier would silence the timer alarm and the wake beep too.
    - if:
        condition:
          lambda: return id(tts_output).current_option() == "External player";
        then:
          - switch.turn_off: speaker_enable
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - script.execute: draw_display
  # `x` is the TTS media URL. This trigger also fires for HA's "announce" API
  # when no media player is attached, so announcements follow the same routing.
  on_tts_end:
    # ESPHome has already started playing `x` on speaker_media_player by the time
    # this runs. So local playback needs no action here - only the external hop,
    # and cancelling the local one when the reply is not meant for this speaker.
    #
    # THE CANCEL GOES FIRST, BEFORE THE HANDOFF TO HOME ASSISTANT. It used to be
    # the other way round, and the Home Assistant call is a network round trip:
    # by the time the stop landed, the local pipeline had opened the file, filled
    # its ring buffers and started the I2S driver, and cancelling in the middle
    # of that left the speaker task thrashing - "ISR event queue overflow" in the
    # log, roughly 700 ms after the announcement began. Stopping first cuts that
    # window to almost nothing. The external speaker loses nothing by being told
    # a few milliseconds later.
    - if:
        condition:
          lambda: return id(tts_output).current_option() != "This device";
        then:
          - homeassistant.service:
              service: media_player.play_media
              data:
                entity_id: ${external_media_player_id}
                media_content_id: !lambda 'return x;'
                media_content_type: music
                announce: "true"
    - if:
        condition:
          lambda: return id(tts_output).current_option() == "External player";
        then:
          # KEEP ASKING UNTIL IT LETS GO. A single stop is useless here and a
          # three second retry was not enough either: the announcement enters
          # ANNOUNCING the moment the URL arrives, but the fetch itself has been
          # measured at SIXTEEN seconds, and a stop issued while it is still
          # downloading is simply discarded. The box then played the whole answer
          # out loud, stalling LVGL for up to 460 ms at a time decoding FLAC it
          # was never meant to touch.
          - lambda: id(cancel_deadline) = millis() + 45000;
          - while:
              condition:
                and:
                  - media_player.is_announcing:
                  - lambda: return millis() < id(cancel_deadline);
              then:
                - media_player.stop:
                    announcement: true
                - delay: 250ms
  on_end:
    # Give a local announcement a moment to start, then let it finish before
    # taking the I2S bus back for the wake word.
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    # TIMEOUT, and it is not decorative. This wait had none, and on 2026-07-20 it
    # hung: a local reply ended with "ISR event queue overflow, restarting
    # speaker task", after which speaker.is_playing never went false. on_end
    # therefore never reached the line that clears tts_reply_active, and that
    # flag gates the media-player idle handler that would otherwise restart the
    # wake word. The device went permanently deaf and only a reboot fixed it.
    #
    # SIXTY SECONDS, NOT TWENTY, AND THE DIFFERENCE IS VISIBLE ON SCREEN. In
    # "This device" mode the whole hold block below is skipped, so this wait is
    # the ONLY thing standing between the pipeline ending and the face being sent
    # back to idle. A long local reply outlives twenty seconds easily: on
    # 2026-07-20 one ran from 15:22:42 to 15:23:14, the timeout expired at
    # 15:23:02, and the clock came up twelve seconds before the box stopped
    # talking. This is a safety net for a speaker that never reports stopping,
    # not a schedule - a reply that really has finished satisfies the condition
    # and moves on immediately.
    - wait_until:
        condition:
          - and:
              - not:
                  media_player.is_announcing:
              - not:
                  speaker.is_playing:
        timeout: 60s
    # Nothing above waits for an EXTERNAL speaker - the box cannot see it. Hold
    # the replying phase for as long as the reply plausibly takes, so the face
    # keeps talking and the wake word stays off until the speaker is done.
    - if:
        condition:
          lambda: return id(tts_output).current_option() != "This device";
        then:
          # FOLLOW THE SPEAKER IF WE CAN SEE IT. The original design assumed the
          # box has no idea what the external player is doing, so the replying
          # phase was held for a guess: a lead-in for cast buffering plus so many
          # milliseconds per character. That guess is always wrong in one
          # direction - the mouth stops early, or the wake word stays deaf for
          # seconds after the room has gone quiet.
          #
          # Home Assistant knows exactly, and we already name the entity, so it
          # costs one text sensor to subscribe to it. The estimate stays as the
          # fallback for when that state is not available.
          - if:
              condition:
                lambda: |-
                  const std::string &st = id(external_player_state).state;
                  return !st.empty() && st != "unknown" && st != "unavailable";
              then:
                # The estimate is not thrown away - it becomes the DEADLINE. If
                # the speaker's state is honest we stop exactly when it does; if
                # it lies, or stays "playing" long after the sound ended, we fall
                # back to roughly the old behaviour instead of standing deaf for
                # the full timeout. A flat 30 s cap here would mean half a minute
                # of not listening after every single reply.
                # FROM WHEN THE REPLY STARTED, not from now. The estimate says
                # how long the whole answer takes to speak, so measuring it from
                # here adds it ON TOP of everything already waited for above -
                # and above is a wait for local playback that can itself run the
                # length of the reply. In "Both" that doubled the deafness: the
                # box finished speaking, and only then did the clock for the
                # external speaker start.
                - lambda: |-
                    uint32_t ms = ${tts_hold_lead_ms} + ${tts_hold_base_ms}
                                + (uint32_t) id(tts_chars) * ${tts_hold_ms_per_char};
                    if (ms > ${tts_hold_max_ms}) ms = ${tts_hold_max_ms};
                    id(hold_deadline) = id(tts_started_ms) + ms;
                - wait_until:
                    condition:
                      lambda: |-
                        return id(external_player_state).state == "playing"
                            || millis() > id(hold_deadline);
                    timeout: ${tts_wait_start_ms}ms
                # IF IT NEVER SAID "playing", DO NOT TRUST IT. Your kitchen
                # speaker reports `off` - so the "has it stopped yet" test below
                # was instantly true and the hold collapsed to about four
                # seconds, letting the wake word back in while the speaker was
                # still talking. When the state never shows playback, fall back
                # to the estimate and simply wait out the deadline.
                - if:
                    condition:
                      lambda: return id(external_player_state).state == "playing";
                    then:
                      - wait_until:
                          condition:
                            lambda: |-
                              return id(external_player_state).state != "playing"
                                  || millis() > id(hold_deadline);
                          timeout: ${tts_hold_max_ms}ms
                    else:
                      - wait_until:
                          condition:
                            lambda: return millis() > id(hold_deadline);
                          timeout: ${tts_hold_max_ms}ms
              else:
                # Same correction as above: what is left of the estimate counted
                # from the start of the reply, not the whole estimate counted
                # from here. Clamped at zero, because by this point the reply has
                # often already outlived it.
                - delay: !lambda |-
                    uint32_t ms = ${tts_hold_lead_ms} + ${tts_hold_base_ms}
                                + (uint32_t) id(tts_chars) * ${tts_hold_ms_per_char};
                    if (ms > ${tts_hold_max_ms}) ms = ${tts_hold_max_ms};
                    const uint32_t deadline = id(tts_started_ms) + ms;
                    const uint32_t now = millis();
                    return now >= deadline ? 0 : deadline - now;
    # AMPLIFIER BACK ON, unconditionally. Not "if we turned it off" - if that ever
    # disagreed with reality the box would be mute for good, timer alarm and wake
    # beep included. Turning on a GPIO that is already on costs nothing.
    - switch.turn_on: speaker_enable
    - lambda: id(tts_reply_active) = false;
    # Was an inline copy of start_wake_word's "On device" branch - MINUS its
    # `not voice_assistant.is_running` guard. That mattered: this handler waits
    # for the announcement and then holds for the length of the reply, so it
    # finishes late. If a new interaction had begun in the meantime, the copy
    # started the wake word INTO a running pipeline, leaving two consumers on one
    # microphone. That is what floods the log with "Not enough free bytes in ring
    # buffer" and "Wake word detection is already running".
    - script.execute: start_wake_word
    # THE TAIL NEEDS THE SAME GUARD, for the same reason spelled out above. This
    # handler can arrive here a full minute late - the wait above allows sixty
    # seconds and the hold below as much again - and by then the pipeline has
    # ended, so nothing stops the user starting a NEW conversation with the
    # button or the wake word. Without this the late tail then forces the idle
    # phase over a live listening screen and wipes the question and answer out
    # from under it. start_wake_word above carries its own guards, which is why
    # it stays outside.
    #
    # AND IT HAS TO WAIT, not test once. Testing once was wrong by 24 ms and it
    # left the screen saying "speaking" indefinitely. On 2026-07-21 the reply
    # finished at 07:24:44.844, this line was reached about 07:24:44.85 while the
    # assistant was still in RESPONSE_FINISHED - so "not running" was false, the
    # tail was skipped, and nothing else resets the phase. The pipeline reached
    # IDLE at 07:24:44.874, thirty milliseconds too late to be seen. The wake
    # word survived the same race only because it waits.
    #
    # The timeout is short on purpose. It is long enough to cover the gap between
    # the announcement ending and the pipeline settling, and far too short to
    # cover a real new conversation - so a genuinely late tail arriving over a
    # live interaction still finds the assistant running and still stands down.
    - wait_until:
        condition:
          not:
            voice_assistant.is_running:
        timeout: 2s
    - if:
        condition:
          not:
            voice_assistant.is_running:
        then:
          - script.execute: set_idle_or_mute_phase
          # Cleared BEFORE the redraw, not after. The other way round,
          # draw_display read the sensors while they still held the last
          # exchange, so the status screen kept showing the previous question
          # and answer until some unrelated event happened to redraw it.
          - text_sensor.template.publish:
              id: text_request
              state: ""
          - text_sensor.template.publish:
              id: text_response
              state: ""
          - script.execute: draw_display
  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: draw_display
          - delay: 1s
          # A second is long enough for the next conversation to have begun -
          # on_end restarts the wake word after an error - and forcing the idle
          # phase on top of it would blank a live listening screen.
          - if:
              condition:
                not:
                  voice_assistant.is_running:
              then:
                - script.execute: set_idle_or_mute_phase
                - script.execute: draw_display
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
    - script.execute: draw_display
  on_timer_started:
    - script.execute: draw_display
  on_timer_cancelled:
    - script.execute: draw_display
  on_timer_updated:
    - script.execute: draw_display
  on_timer_tick:
    # Only the countdown and the strip can change on a tick, and both live on
    # LVGL's top layer, above every page. draw_display here meant a whole UI
    # recompute - and a page show - once per second for as long as a timer ran.
    - script.execute: refresh_timer_widgets
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - script.execute: draw_display

###############################################################################
# STATE
###############################################################################

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: first_timer
    type: voice_assistant::Timer
    restore_value: false
  # 0 = nothing shown, 1 = a running timer, 2 = a paused one. Lets the widget
  # visibility be touched only when it actually changes.
  - id: timer_ui_state
    type: int
    restore_value: false
    initial_value: "0"
  - id: has_timer
    type: bool
    restore_value: false
  - id: has_active_timer
    type: bool
    restore_value: false
  - id: timer_percent
    type: int
    restore_value: false
    initial_value: "0"
  # The percentage actually written to the bar, so the tick can skip writing the
  # same one again. -1 means "nothing written yet", which is also what the
  # visibility transition resets it to when the other bar takes over.
  - id: timer_percent_drawn
    type: int
    restore_value: false
    initial_value: "-1"
  # The countdown as it is actually DISPLAYED, so the tick can skip rewriting an
  # identical string. Not the same as seconds_left: above an hour the label shows
  # HH:MM, so the displayed value is left/60 and only moves once a minute.
  # -1 means "nothing written yet", same convention as timer_percent_drawn.
  - id: timer_label_drawn
    type: int
    restore_value: false
    initial_value: "-1"
  # false = idle_page, true = idle_page_alt. Survives reboots so the device comes
  # back showing whichever screen was last chosen.
  - id: idle_alt
    type: bool
    restore_value: true
    initial_value: "false"
  # WHERE ON THE CROSS the idle screen currently sits. 0 is home, and `idle_alt`
  # above only means anything there - it is home's own tap toggle, not a
  # position. Survives reboots for the same reason `idle_alt` does.
  #   0 = home     1 = the screen above     2 = below     3 = the side screen
  # It is deliberately a position rather than "whatever page is loaded": after a
  # conversation the phase pages have been and gone, and `draw_display` needs to
  # know where to put you back without asking LVGL what it happens to be showing.
  - id: idle_pos
    type: int
    restore_value: true
    initial_value: "0"
  # WHEN THE LAST SWIPE HAPPENED, in millis(). A swipe that starts on a button
  # still makes that button report a click when the finger lifts - LVGL treats
  # the two as independent - so a swipe across the settings tiles changed the
  # screen AND toggled whatever it started on. Seen on hardware 2026-07-22.
  #
  # Anything clickable that shares a screen with the gestures checks this and
  # stands down if a swipe just went past. A timestamp rather than a flag,
  # because a flag has to be cleared by someone and there is no reliable moment
  # to do it in; a timestamp goes stale by itself.
  - id: last_swipe_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Set on press when the assistant was already running, so the release knows
  # this press was reaching for the brake rather than the accelerator.
  - id: btn_wants_cancel
    type: bool
    restore_value: false
    initial_value: "false"
  # Set from the moment a reply starts until the talking animation is done with
  # it. The media player's own handlers must not touch the screen or the wake
  # word in that window: at TTS_END the assistant has already gone IDLE, so
  # without this they treat the reply as ordinary playback - on_announcement
  # flips to the muted screen and on_idle ends the talking face early.
  - id: tts_reply_active
    type: bool
    restore_value: false
    initial_value: "false"

  # How long to keep telling the local player to stop, in millis().
  - id: cancel_deadline
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # When the replying phase must end at the latest, in millis(). The external
  # speaker's own state ends it sooner when that state can be trusted.
  - id: hold_deadline
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Consecutive 10 s checks during which the assistant was idle and the wake word
  # was not running. Four in a row and the watchdog restarts it.
  - id: deaf_ticks
    type: int
    restore_value: false
    initial_value: "0"
  # When the button under the screen went down, in millis(). Only the diagnostic
  # twin of that button writes it, purely to report how long each touch lasted.
  - id: btn_down_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Raw, UNFILTERED touches on the button under the screen, and how long the last
  # one lasted. These exist to settle a question the log cannot answer: a touch
  # shorter than the 50 ms debounce produces no on_press, no on_release and no
  # log line, so "the debounce is working" and "nothing touched the screen" look
  # exactly alike. A counter that climbs while the real button stays silent is
  # the difference between them.
  - id: raw_touch_count
    type: int
    restore_value: false
    initial_value: "0"
  - id: raw_touch_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: raw_touch_down_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # True from the moment a wake word fires until the pipeline has actually been
  # started. Without it the wake beep finishing puts the media player into idle,
  # and that trigger restarts the wake word - a fraction of a second before the
  # assistant opens the microphone. The result was TFLite inference running for
  # the whole conversation, alongside the audio streaming, for nothing.
  - id: wake_start_pending
    type: bool
    restore_value: false
    initial_value: "false"
  # Set while the wake beep plays. Without it the media player's on_announcement
  # handler would treat the beep as user-initiated playback and flash the muted
  # screen between the wake word and the listening face.
  - id: wake_sound_active
    type: bool
    restore_value: false
    initial_value: "false"
  - id: boot_frame
    type: int
    restore_value: false
    initial_value: "0"
  # Length of the reply being spoken, for the external-playback hold above.
  - id: tts_chars
    type: int
    restore_value: false
    initial_value: "0"
  # When the reply began, in millis(). The hold below is an estimate of how long
  # the whole answer takes to SPEAK, so it has to be measured from here - on_end
  # reaches that code long after this, having already waited out local playback.
  - id: tts_started_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

script:
  # Boot dots: the lit one grows and goes fully opaque, the others sit back, and
  # all three cross-fade through the palette a third of a cycle apart.
  - id: boot_animate
    mode: single
    parameters:
      index: int
    then:
      - lvgl.widget.update:
          id: boot_dot_1
          width: !lambda |-
            return index == 0 ? 16 : 10;
          height: !lambda |-
            return index == 0 ? 16 : 10;
          bg_opa: !lambda |-
            return index == 0 ? 255 : 110;
          bg_color: !lambda |-
            static const uint32_t PAL[] = {${boot_palette}};
            const int N = sizeof(PAL) / sizeof(PAL[0]);
            const int STEPS = ${boot_fade_steps};
            const uint32_t f = (uint32_t) id(boot_frame) + 0;
            const int i = (f / STEPS) % N;
            const int j = (i + 1) % N;
            const int t = f % STEPS;
            const uint8_t r = (((PAL[i] >> 16) & 0xFF) * (STEPS - t) + ((PAL[j] >> 16) & 0xFF) * t) / STEPS;
            const uint8_t g = (((PAL[i] >>  8) & 0xFF) * (STEPS - t) + ((PAL[j] >>  8) & 0xFF) * t) / STEPS;
            const uint8_t b = (((PAL[i]      ) & 0xFF) * (STEPS - t) + ((PAL[j]      ) & 0xFF) * t) / STEPS;
            return lv_color_make(r, g, b);
      - lvgl.widget.update:
          id: boot_dot_2
          width: !lambda |-
            return index == 1 ? 16 : 10;
          height: !lambda |-
            return index == 1 ? 16 : 10;
          bg_opa: !lambda |-
            return index == 1 ? 255 : 110;
          bg_color: !lambda |-
            static const uint32_t PAL[] = {${boot_palette}};
            const int N = sizeof(PAL) / sizeof(PAL[0]);
            const int STEPS = ${boot_fade_steps};
            const uint32_t f = (uint32_t) id(boot_frame) + 4;
            const int i = (f / STEPS) % N;
            const int j = (i + 1) % N;
            const int t = f % STEPS;
            const uint8_t r = (((PAL[i] >> 16) & 0xFF) * (STEPS - t) + ((PAL[j] >> 16) & 0xFF) * t) / STEPS;
            const uint8_t g = (((PAL[i] >>  8) & 0xFF) * (STEPS - t) + ((PAL[j] >>  8) & 0xFF) * t) / STEPS;
            const uint8_t b = (((PAL[i]      ) & 0xFF) * (STEPS - t) + ((PAL[j]      ) & 0xFF) * t) / STEPS;
            return lv_color_make(r, g, b);
      - lvgl.widget.update:
          id: boot_dot_3
          width: !lambda |-
            return index == 2 ? 16 : 10;
          height: !lambda |-
            return index == 2 ? 16 : 10;
          bg_opa: !lambda |-
            return index == 2 ? 255 : 110;
          bg_color: !lambda |-
            static const uint32_t PAL[] = {${boot_palette}};
            const int N = sizeof(PAL) / sizeof(PAL[0]);
            const int STEPS = ${boot_fade_steps};
            const uint32_t f = (uint32_t) id(boot_frame) + 8;
            const int i = (f / STEPS) % N;
            const int j = (i + 1) % N;
            const int t = f % STEPS;
            const uint8_t r = (((PAL[i] >> 16) & 0xFF) * (STEPS - t) + ((PAL[j] >> 16) & 0xFF) * t) / STEPS;
            const uint8_t g = (((PAL[i] >>  8) & 0xFF) * (STEPS - t) + ((PAL[j] >>  8) & 0xFF) * t) / STEPS;
            const uint8_t b = (((PAL[i]      ) & 0xFF) * (STEPS - t) + ((PAL[j]      ) & 0xFF) * t) / STEPS;
            return lv_color_make(r, g, b);

  # Flip the idle screen between its two pages. Anything can call this - the
  # screen packages wire it to a tap.
  - id: toggle_idle_screen
    then:
      - lambda: id(idle_alt) = !id(idle_alt);
      - script.execute: draw_display

  # --- SWIPE NAVIGATION -------------------------------------------------------
  #
  # These animate; `draw_display` does not. That split is on purpose. A swipe is
  # a direct manipulation and should look like one - the new screen arrives from
  # the side you pushed. Coming back after a conversation is not a gesture and
  # should just be there, with no animation to sit through.
  #
  # Each script moves `idle_pos` and shows the page itself rather than delegating
  # to `draw_display`, because `draw_display` has no way to express "and slide it
  # in from the left". The position it leaves behind is what puts you back here
  # when the assistant is finished.
  #
  # `MOVE_*` rather than `OVER_*`: it drags both screens, so the old one leaves as
  # the new one arrives and the gesture reads as moving a surface rather than
  # dealing a card on top of it.
  #
  # All four ignore the gesture unless the assistant is idle. Swiping mid-answer
  # would fight `draw_display` for the screen and the screen would win by
  # accident, which is not a behaviour anyone could predict.

  # Swiping back onto home always lands on `idle_page`, never on the character,
  # and clears the tap toggle with it. Two ways to reach one screen that
  # disagreed about which of its two faces you get would be worse than the small
  # surprise of "swipe home, tap for the robot".
  #
  # Each script is guarded on being idle. Swiping mid-answer would fight
  # `draw_display` for the screen, and which one won would come down to timing.

  - id: idle_swipe_up             # the screen below rises into view
    then:
      - lambda: id(last_swipe_ms) = millis();
      - if:
          condition:
            and:
              - lambda: return id(idle_pos) == 0 || id(idle_pos) == 1;
              # Idle OR muted. Muting is a resting state, not something
              # happening, and refusing to navigate while muted meant the
              # one screen you reach for to unmute was the one you could
              # not swipe away from.
              - lambda: |-
                  const int p = id(voice_assistant_phase);
                  return p == ${voice_assist_idle_phase_id}
                      || p == ${voice_assist_muted_phase_id};
          then:
            - lambda: |-
                const bool home = (id(idle_pos) == 1);
                id(idle_pos) = home ? 0 : 2;
                if (home) id(idle_alt) = false;
            - if:
                condition:
                  lambda: return id(idle_pos) == 0;
                then:
                  - lvgl.page.show:
                      id: ${idle_page}
                      animation: ${swipe_anim_TOP}
                      time: ${swipe_anim_ms}ms
                else:
                  - lvgl.page.show:
                      id: ${idle_page_below}
                      animation: ${swipe_anim_TOP}
                      time: ${swipe_anim_ms}ms

  - id: idle_swipe_down           # the screen above drops into view
    then:
      - lambda: id(last_swipe_ms) = millis();
      - if:
          condition:
            and:
              - lambda: return id(idle_pos) == 0 || id(idle_pos) == 2;
              # Idle OR muted. Muting is a resting state, not something
              # happening, and refusing to navigate while muted meant the
              # one screen you reach for to unmute was the one you could
              # not swipe away from.
              - lambda: |-
                  const int p = id(voice_assistant_phase);
                  return p == ${voice_assist_idle_phase_id}
                      || p == ${voice_assist_muted_phase_id};
          then:
            - lambda: |-
                const bool home = (id(idle_pos) == 2);
                id(idle_pos) = home ? 0 : 1;
                if (home) id(idle_alt) = false;
            - if:
                condition:
                  lambda: return id(idle_pos) == 0;
                then:
                  - lvgl.page.show:
                      id: ${idle_page}
                      animation: ${swipe_anim_BOTTOM}
                      time: ${swipe_anim_ms}ms
                else:
                  - lvgl.page.show:
                      id: ${idle_page_above}
                      animation: ${swipe_anim_BOTTOM}
                      time: ${swipe_anim_ms}ms

  # LEFT and RIGHT are the carousel and it wraps. Only home and the side screen
  # are on it today, so it is a two-stop loop; adding more side screens means
  # extending this the same way, not rewriting it.
  - id: idle_swipe_left
    then:
      - lambda: id(last_swipe_ms) = millis();
      - if:
          condition:
            and:
              - lambda: return id(idle_pos) == 0 || id(idle_pos) == 3;
              # Idle OR muted. Muting is a resting state, not something
              # happening, and refusing to navigate while muted meant the
              # one screen you reach for to unmute was the one you could
              # not swipe away from.
              - lambda: |-
                  const int p = id(voice_assistant_phase);
                  return p == ${voice_assist_idle_phase_id}
                      || p == ${voice_assist_muted_phase_id};
          then:
            - lambda: |-
                const bool home = (id(idle_pos) == 3);
                id(idle_pos) = home ? 0 : 3;
                if (home) id(idle_alt) = false;
            - if:
                condition:
                  lambda: return id(idle_pos) == 0;
                then:
                  - lvgl.page.show:
                      id: ${idle_page}
                      animation: ${swipe_anim_LEFT}
                      time: ${swipe_anim_ms}ms
                else:
                  - lvgl.page.show:
                      id: ${idle_page_side}
                      animation: ${swipe_anim_LEFT}
                      time: ${swipe_anim_ms}ms

  - id: idle_swipe_right
    then:
      - lambda: id(last_swipe_ms) = millis();
      - if:
          condition:
            and:
              - lambda: return id(idle_pos) == 0 || id(idle_pos) == 3;
              # Idle OR muted. Muting is a resting state, not something
              # happening, and refusing to navigate while muted meant the
              # one screen you reach for to unmute was the one you could
              # not swipe away from.
              - lambda: |-
                  const int p = id(voice_assistant_phase);
                  return p == ${voice_assist_idle_phase_id}
                      || p == ${voice_assist_muted_phase_id};
          then:
            - lambda: |-
                const bool home = (id(idle_pos) == 3);
                id(idle_pos) = home ? 0 : 3;
                if (home) id(idle_alt) = false;
            - if:
                condition:
                  lambda: return id(idle_pos) == 0;
                then:
                  - lvgl.page.show:
                      id: ${idle_page}
                      animation: ${swipe_anim_RIGHT}
                      time: ${swipe_anim_ms}ms
                else:
                  - lvgl.page.show:
                      id: ${idle_page_side}
                      animation: ${swipe_anim_RIGHT}
                      time: ${swipe_anim_ms}ms

  # Single entry point for "put the right thing on screen". Every state change
  # calls this rather than switching pages itself, so there is one place where
  # the precedence (booting > no wifi > no HA > phase) is decided.
  - id: draw_display
    then:
      - script.execute: refresh_timer_widgets
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - if:
                condition:
                  not:
                    lvgl.page.is_showing: page_boot
                then:
                  - lvgl.page.show: page_boot
          else:
            - if:
                condition:
                  not:
                    wifi.connected:
                then:
                  - if:
                      condition:
                        not:
                          lvgl.page.is_showing: page_no_wifi
                      then:
                        - lvgl.page.show: page_no_wifi
                else:
                  - if:
                      condition:
                        not:
                          api.connected:
                      then:
                        - if:
                            condition:
                              not:
                                lvgl.page.is_showing: page_no_ha
                            then:
                              - lvgl.page.show: page_no_ha
                      else:
                        - script.execute: show_phase_page
      # AFTER the page work, and only if the status page is the one on screen.
      # These three labels live on page_status alone, which a character package
      # claims for no phase at all - so with any assistant installed this was
      # three string copies and three invalidates on every single state change,
      # for widgets nobody was looking at.
      - if:
          condition:
            lvgl.page.is_showing: page_status
          then:
            - script.execute: sync_text

  # Phase -> page. Flat ifs rather than a lambda `switch`, because page changes
  # must go through the LVGL component's own action: it tracks which page is
  # current, and lv_scr_load() behind its back desyncs that bookkeeping.
  # Phase -> page. Flat ifs rather than a lambda `switch`, because page changes
  # must go through the LVGL component's own action: it tracks which page is
  # current, and lv_scr_load() behind its back desyncs that bookkeeping.
  #
  # EVERY SHOW IS GUARDED BY "not already showing", and that guard is the single
  # most valuable line in this file. LvglComponent::show_page does NOT check
  # whether the requested page is already current - it calls lv_screen_load()
  # regardless, which invalidates the WHOLE screen: 320x240 against a 25% draw
  # buffer is four passes. A character package points every phase at page_face,
  # so listening -> thinking -> replying used to repaint the entire display three
  # times for a page that never changed.
  - id: show_phase_page
    then:
      - if:
          condition:
            and:
              - lambda: return id(voice_assistant_phase) == ${voice_assist_listening_phase_id};
              - not:
                  lvgl.page.is_showing: ${listening_page}
          then:
            - lvgl.page.show: ${listening_page}
      - if:
          condition:
            and:
              - lambda: return id(voice_assistant_phase) == ${voice_assist_thinking_phase_id};
              - not:
                  lvgl.page.is_showing: ${thinking_page}
          then:
            - lvgl.page.show: ${thinking_page}
      - if:
          condition:
            and:
              - lambda: return id(voice_assistant_phase) == ${voice_assist_replying_phase_id};
              - not:
                  lvgl.page.is_showing: ${replying_page}
          then:
            - lvgl.page.show: ${replying_page}
      - if:
          condition:
            and:
              - lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
              - not:
                  lvgl.page.is_showing: ${error_page}
          then:
            - lvgl.page.show: ${error_page}
      - if:
          # MUTED ONLY CLAIMS THE SCREEN ON HOME. Muting is a resting state, not
          # something happening, and it is usually switched on from the settings
          # screen - where being thrown onto the character and left there is
          # exactly wrong. Worse, it used to be a trap: the swipe scripts only run
          # while the phase is idle, so muting from another screen took you to the
          # character and disabled the way back.
          #
          # On home the old behaviour is right and stays: the character showing a
          # muted face is the clearest indication there is that the microphone is
          # off.
          condition:
            and:
              - lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id};
              - lambda: return id(idle_pos) == 0;
              - not:
                  lvgl.page.is_showing: ${muted_page}
          then:
            - lvgl.page.show: ${muted_page}
      - if:
          condition:
            and:
              - lambda: return id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id};
              - not:
                  lvgl.page.is_showing: page_no_ha
          then:
            - lvgl.page.show: page_no_ha
      - if:
          condition:
            and:
              - lambda: return id(voice_assistant_phase) == ${voice_assist_timer_finished_phase_id};
              - not:
                  lvgl.page.is_showing: ${timer_page}
          then:
            - lvgl.page.show: ${timer_page}
      - if:
          condition:
            lambda: |-
              const int p = id(voice_assistant_phase);
              return p != ${voice_assist_listening_phase_id}
                  && p != ${voice_assist_thinking_phase_id}
                  && p != ${voice_assist_replying_phase_id}
                  && p != ${voice_assist_error_phase_id}
                  && p != ${voice_assist_muted_phase_id}
                  && p != ${voice_assist_not_ready_phase_id}
                  && p != ${voice_assist_timer_finished_phase_id};
          then:
            # BACK TO WHEREVER THE SWIPE LEFT YOU. `idle_pos` is the whole point
            # of that global: the phase pages have been and gone, and without it
            # every conversation would dump you back on home no matter which
            # screen you were reading. No animation here - this is not a gesture,
            # it is the assistant getting out of the way.
            - if:
                condition:
                  lambda: return id(idle_pos) == 1;
                then:
                  - if:
                      condition:
                        not:
                          lvgl.page.is_showing: ${idle_page_above}
                      then:
                        - lvgl.page.show: ${idle_page_above}
            - if:
                condition:
                  lambda: return id(idle_pos) == 2;
                then:
                  - if:
                      condition:
                        not:
                          lvgl.page.is_showing: ${idle_page_below}
                      then:
                        - lvgl.page.show: ${idle_page_below}
            - if:
                condition:
                  lambda: return id(idle_pos) == 3;
                then:
                  - if:
                      condition:
                        not:
                          lvgl.page.is_showing: ${idle_page_side}
                      then:
                        - lvgl.page.show: ${idle_page_side}
            # Position 0 is home, and only there does the tap toggle mean
            # anything - it picks which of home's two faces you get.
            - if:
                condition:
                  lambda: return id(idle_pos) == 0;
                then:
                  - if:
                      condition:
                        lambda: return id(idle_alt);
                      then:
                        - if:
                            condition:
                              not:
                                lvgl.page.is_showing: ${idle_page_alt}
                            then:
                              - lvgl.page.show: ${idle_page_alt}
                      else:
                        - if:
                            condition:
                              not:
                                lvgl.page.is_showing: ${idle_page}
                            then:
                              - lvgl.page.show: ${idle_page}

  # Push what was said / what was answered onto the labels. The text sensors are
  # the source of truth; LVGL labels do not follow them on their own.
  - id: sync_text
    then:
      - lvgl.label.update:
          id: request_label
          text: !lambda return id(text_request).state;
      - lvgl.label.update:
          id: response_label
          text: !lambda return id(text_response).state;
      - lvgl.label.update:
          id: status_phase
          text: !lambda |-
            switch (id(voice_assistant_phase)) {
              case ${voice_assist_listening_phase_id}: return std::string("${status_listening}");
              case ${voice_assist_thinking_phase_id}:  return std::string("${status_thinking}");
              case ${voice_assist_replying_phase_id}:  return std::string("${status_replying}");
              case ${voice_assist_error_phase_id}:     return std::string("${status_error}");
              case ${voice_assist_muted_phase_id}:     return std::string("${status_muted}");
              case ${voice_assist_timer_finished_phase_id}: return std::string("${status_timer}");
              default: return std::string("${status_idle}");
            }

  # Walks the timer list once and caches what the UI needs: is there a timer at
  # all, is one actually counting, which one finishes first, and how far along
  # it is. `get_timers()` hands back a std::vector<Timer>.
  - id: scan_timers
    then:
      - lambda: |-
          const auto &timers = id(va).get_timers();
          id(has_timer) = !timers.empty();
          id(has_active_timer) = false;
          id(timer_percent) = 0;
          if (timers.empty()) {
            return;
          }
          bool picked = false;
          voice_assistant::Timer best{};
          // Prefer the soonest running timer; fall back to the soonest paused one.
          for (const auto &timer : timers) {
            if (!timer.is_active) {
              continue;
            }
            id(has_active_timer) = true;
            if (!picked || timer.seconds_left < best.seconds_left) {
              best = timer;
              picked = true;
            }
          }
          if (!picked) {
            for (const auto &timer : timers) {
              if (!picked || timer.seconds_left < best.seconds_left) {
                best = timer;
                picked = true;
              }
            }
          }
          id(first_timer) = best;
          const uint32_t total = std::max(best.total_seconds, static_cast<uint32_t>(1));
          // Integer maths with rounding, not float + lroundf: this runs once a
          // second for as long as a timer is counting.
          id(timer_percent) = (int) ((100u * best.seconds_left + total / 2) / total);

  # Paints the timer strip and countdown that live on LVGL's top layer, above
  # whichever page is showing. Two bars rather than one recoloured bar: a running
  # timer is green, a paused one blue, and swapping which is visible needs no
  # style updates at runtime.
  - id: refresh_timer_widgets
    then:
      - script.execute: scan_timers
      - if:
          condition:
            lambda: return id(has_timer);
          then:
            # ONLY WHEN THE DISPLAYED TEXT MOVED. Below an hour it moves every
            # second and this guard costs one comparison. Above an hour the label
            # is HH:MM, so it moves once a MINUTE while the tick still runs sixty
            # times - and each of those writes was a snprintf, a std::string, a
            # strdup inside LVGL and a re-layout of a 26 px font, to end up with
            # the same pixels. The key is therefore what is SHOWN (left/60 above
            # an hour, left below it), not seconds_left.
            - if:
                condition:
                  lambda: |-
                    const uint32_t left = id(first_timer).seconds_left;
                    const int shown = left >= 3600 ? (int) (left / 60) : (int) left;
                    if (shown == id(timer_label_drawn)) return false;
                    id(timer_label_drawn) = shown;
                    return true;
                then:
                  - lvgl.label.update:
                      id: timer_label
                      text: !lambda |-
                        const uint32_t left = id(first_timer).seconds_left;
                        const uint32_t hours = left / 3600;
                        const uint32_t minutes = (left % 3600) / 60;
                        const uint32_t seconds = left % 60;
                        char buf[16];
                        // Cast for the format: uint32_t is `long unsigned` on this
                        // toolchain, so %u warned on every build.
                        if (hours > 0) {
                          snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned) hours, (unsigned) minutes);
                        } else {
                          snprintf(buf, sizeof(buf), "%02u:%02u", (unsigned) minutes, (unsigned) seconds);
                        }
                        return std::string(buf);
            # ONLY WHEN THE PERCENTAGE ACTUALLY MOVED. The bar is a whole number
            # out of a hundred: a thirty minute timer advances it once every
            # eighteen seconds, so seventeen writes in eighteen invalidated a
            # 320 px bar to redraw exactly the same pixels. Same reasoning as the
            # visibility block just below.
            - if:
                condition:
                  lambda: |-
                    if (id(timer_percent) == id(timer_percent_drawn)) return false;
                    id(timer_percent_drawn) = id(timer_percent);
                    return true;
                then:
                  - if:
                      condition:
                        lambda: return id(has_active_timer);
                      then:
                        - lvgl.bar.update:
                            id: timer_bar_active
                            value: !lambda return id(timer_percent);
                      else:
                        - lvgl.bar.update:
                            id: timer_bar_paused
                            value: !lambda return id(timer_percent);
      # Visibility changes ONLY on a transition. draw_display runs this on every
      # phase change, and with no timer - the normal state - it used to issue
      # three hides on three already-hidden widgets every single time.
      - if:
          condition:
            lambda: |-
              const int want = !id(has_timer) ? 0 : (id(has_active_timer) ? 1 : 2);
              if (want == id(timer_ui_state)) return false;
              id(timer_ui_state) = want;
              // The OTHER bar is about to become the visible one and it still
              // holds whatever it was left at. Forcing the next tick to write
              // is what stops it appearing at zero. The label needs the same
              // treatment for the same reason: it was hidden holding old text.
              id(timer_percent_drawn) = -1;
              id(timer_label_drawn) = -1;
              return true;
          then:
            - if:
                condition:
                  lambda: return id(timer_ui_state) == 0;
                then:
                  - lvgl.widget.hide: timer_label
                  - lvgl.widget.hide: timer_bar_active
                  - lvgl.widget.hide: timer_bar_paused
            - if:
                condition:
                  lambda: return id(timer_ui_state) == 1;
                then:
                  - lvgl.widget.show: timer_label
                  - lvgl.widget.show: timer_bar_active
                  - lvgl.widget.hide: timer_bar_paused
            - if:
                condition:
                  lambda: return id(timer_ui_state) == 2;
                then:
                  - lvgl.widget.show: timer_label
                  - lvgl.widget.show: timer_bar_paused
                  - lvgl.widget.hide: timer_bar_active

  # Starts whichever wake word engine is selected. mWW runs on the device;
  # "In Home Assistant" streams audio continuously instead.
  - id: start_wake_word
    # RESTART, not the default single. A pending call below can be waiting out a
    # pipeline that is still finishing; if a new interaction begins meanwhile,
    # `single` would DROP the fresh call and let the stale one proceed against
    # the wrong state. Restart supersedes it.
    mode: restart
    then:
      # WAIT for a pipeline to finish rather than giving up on it. The guards
      # below refuse to start the wake word into a running pipeline, which is
      # right - two consumers on one microphone floods the ring buffer. But
      # refusing SILENTLY and never trying again is what made the device go deaf
      # after every reply, and the log of 2026-07-20 shows the margin: on_end
      # holds the replying phase while the voice assistant is still in
      # STREAMING_RESPONSE, so it reached this script at 15:12:50.6 and the
      # pipeline went idle at 15:12:52.8. Two and a bit seconds, and the wake
      # word stayed off until the watchdog noticed 37 seconds later.
      #
      # The speaker matters too: starting the microphone while the box is still
      # playing puts two claims on the single I2S bus.
      #
      # wake_start_pending IS NOT OPTIONAL HERE, and leaving it out is what
      # flooded the log with "Not enough free bytes in ring buffer" on
      # 2026-07-20. Between micro_wake_word.stop and voice_assistant.start in
      # on_wake_word_detected there is a window - the beep - where the pipeline
      # has NOT started yet, so "is the assistant running" answers no, and the
      # speaker falls silent the moment the beep ends. A call that was sitting in
      # this wait sailed straight through that gap, started the wake word, and
      # the pipeline then opened the microphone underneath it: two consumers on
      # one stream. The flag marks exactly that window, which is why the sibling
      # handler on the media player consults it too.
      - wait_until:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - not:
                  - speaker.is_playing:
              - lambda: return !id(wake_start_pending);
          timeout: 30s
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return !id(wake_start_pending);
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return !id(wake_start_pending);
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:

  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:

  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};

  # Tap-to-talk: same entry point as a wake word, minus the wake word. Ignored
  # while muted or while a pipeline is already running.
  - id: tap_to_talk
    then:
      - if:
          condition:
            and:
              - api.connected:
              - switch.is_off: mute
              - not:
                  voice_assistant.is_running:
          then:
            # Says so in the log. A pipeline that starts with no "Detected" line
            # and no wake beep looks identical whether it came from the button
            # under the screen or from Home Assistant calling start_va - and
            # those need very different debugging. Without this the log cannot
            # tell them apart.
            - logger.log:
                level: INFO
                format: "Assistant started by the button under the screen"
            # THE SAME WINDOW AS on_wake_word_detected, and it needs the same
            # flag. Between stopping the wake word and starting the pipeline
            # there are 100 ms in which nothing is running and nothing is
            # playing - so the watchdog, the media player's idle handler, or a
            # start_wake_word parked in its wait would all happily start the
            # wake word right before the pipeline opens the microphone. That is
            # the ring buffer flood, reached by a second route.
            - lambda: id(wake_start_pending) = true;
            - script.execute: stop_wake_word
            - delay: 100ms
            - voice_assistant.start:
            - lambda: id(wake_start_pending) = false;

# A DEAF DEVICE IS THE ONE FAILURE THAT MATTERS HERE, so this is the backstop.
#
# Everything that starts the wake word hangs off a trigger - a pipeline ending,
# an announcement finishing, a mute being lifted. Any one of those paths getting
# stuck leaves the box listening for nothing, and it stays that way until it is
# rebooted. That is exactly what happened on 2026-07-20, when a wait without a
# timeout in on_end never returned.
#
# The timeouts above fix that particular path. This covers the rest of them: if
# the assistant is idle and the wake word simply is not running, after 40 seconds
# start it, whatever the reason. It deliberately does NOT consult tts_reply_active
# or any of our own flags - those are precisely what get stuck.
#
# SCOPE, because the last condition is easy to read past: this watches the "On
# device" engine ONLY. With the engine set to "In Home Assistant" the listener is
# voice_assistant.start_continuous, micro_wake_word never runs, and nothing here
# ever counts - so that mode has no backstop. Covering it needs a different test,
# since "is the assistant running" means something else entirely while streaming
# continuously, and getting it wrong would restart the stream every 40 seconds
# forever. Left deliberately uncovered rather than covered by guesswork.
interval:
  # THE THIRD WAY BACK. An External reply cuts the amplifier; `on_end` restores it
  # and the timer alarm restores it, both unconditionally. This covers the case
  # where `on_end` never arrives at all - a reboot mid-reply, or a handler that
  # died before its tail.
  #
  # Unconditional on purpose, and cheap enough to be: writing a GPIO that is
  # already high costs nothing, and consulting a flag would mean a flag that can
  # disagree with the hardware - which is exactly how a box ends up permanently
  # silent. The only guard is "no reply in progress", so it cannot fight a live
  # one.
  - interval: 30s
    then:
      - if:
          condition:
            lambda: return !id(tts_reply_active);
          then:
            - switch.turn_on: speaker_enable

  - interval: 10s
    then:
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - not:
                  micro_wake_word.is_running:
              - switch.is_off: mute
              - lambda: return !id(wake_start_pending);
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(deaf_ticks)++;
          else:
            - lambda: id(deaf_ticks) = 0;
      - if:
          condition:
            lambda: return id(deaf_ticks) >= 4;
          then:
            - logger.log:
                level: WARN
                format: "Wake word has been off for 40s with the assistant idle - restarting it"
            - lambda: id(deaf_ticks) = 0;
            - script.execute: start_wake_word

  # Runs only while the boot page is on screen, which is a few seconds per reboot.
  - interval: ${boot_tick}
    then:
      - if:
          condition:
            lvgl.page.is_showing: page_boot
          then:
            - lambda: id(boot_frame)++;
            - script.execute:
                id: boot_animate
                index: !lambda |-
                  return (id(boot_frame) / 2) % 3;

###############################################################################
# ENTITIES
###############################################################################

binary_sensor:
  # WHICH IDLE SCREEN IS ACTUALLY SELECTED. `idle_alt` is flipped by tapping the
  # screen and it is `restore_value: true`, so it survives reboots - which means
  # the `idle_page` / `idle_page_alt` substitutions in the config describe the
  # boot default and NOT what the device is showing. Reading the config and
  # assuming it matched reality produced a wrong performance diagnosis on
  # 2026-07-21: idle was on the character, not the clock, so a stall was
  # attributed to a page reload that the `is_showing` guard was in fact
  # preventing. Same trap as "TTS output", which is also restored from flash.
  #
  # Diagnostic and disabled by default: this exists to be switched on while
  # measuring, so that a number can be tied to a known screen state.
  - platform: template
    name: "Diag: idle shows the character"
    entity_category: diagnostic
    disabled_by_default: true
    lambda: return id(idle_alt);

  - platform: gpio
    id: top_button_sensor
    internal: true
    pin:
      number: ${top_button}
      mode: INPUT_PULLUP
      inverted: true
      ignore_strapping_warning: true
    on_multi_click:
      # Short press: silence a ringing timer.
      - timing:
          - ON for at least 50ms
          - OFF for at least 50ms
        then:
          - switch.turn_off: timer_ringing
      # Held for 10 s: factory reset.
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn

  # The red circle silkscreened below the screen is not a GPIO - it is touch
  # button 0 on the GT911. It is the ONLY thing that starts the assistant by
  # touch: the screen itself belongs to the UI, so widgets get every tap.
  #
  # While a timer is ringing the button silences it instead of starting a
  # pipeline - otherwise reaching out to stop the alarm would also wake the
  # assistant.
  - platform: gt911
    id: home_button
    internal: true
    index: 0
    # DEBOUNCE, and MEASURED - do not remove it and do not retune it casually.
    #
    # On 2026-07-20 this button started sixteen pipelines in ten minutes with
    # nobody near it, each holding the microphone for fifteen seconds and ending
    # on "stt-no-text-recognized". 50 ms was a guess at the time.
    #
    # Settled on 2026-07-22 with the unfiltered twin below, at the device:
    #   * six taps on the screen surface       -> counter +0
    #   * three deliberate presses of this button -> counter +3, 119 and 151 ms
    #   * nobody touching anything             -> counter +12 in ~30 min, 21 ms
    #
    # So the phantom touches never stopped - this filter is the only reason they
    # no longer start pipelines - and the guessed threshold landed cleanly
    # between 21 ms of noise and 119 ms of fingertip. Lowering it lets the
    # phantoms back in; raising it starts eating real presses.
    filters:
      - delayed_on: 50ms
    on_press:
      - lambda: id(btn_down_ms) = millis();
      # THREE THINGS, in order of what is most urgent to interrupt.
      #
      # A ringing timer wins: you are reaching for the box to make it stop.
      #
      # Then, if the assistant is already running, this CANCELS it. A false wake
      # word used to mean standing there for fifteen seconds while it listened to
      # a room that was not talking to it, because `tap_to_talk` declines to start
      # a second pipeline and so the button did nothing at all. Same button, same
      # press, and now it is the way out.
      #
      # Only then does a press start one.
      #
      # Cancelling mid-REPLY stops the pipeline but will not reliably cut audio
      # that is already playing: a stop issued while the box is still fetching is
      # discarded, which is documented at length around `on_tts_end`. It ends the
      # turn, it does not always end the sound.
      - if:
          condition:
            switch.is_on: timer_ringing
          then:
            - switch.turn_off: timer_ringing
          else:
            - if:
                condition:
                  not:
                    voice_assistant.is_running:
                then:
                  # Starting stays on PRESS, because a button that starts talking
                  # should feel immediate.
                  - lambda: id(btn_wants_cancel) = false;
                  - script.execute: tap_to_talk
                else:
                  # Cancelling is decided here but CARRIED OUT ON RELEASE, and
                  # only if the press was long enough - see on_release below.
                  - lambda: id(btn_wants_cancel) = true;
    # How long the touch lasted, which is the number the debounce above was set
    # blind. A real fingertip rests for well over a hundred milliseconds; if the
    # phantom presses report far less, the filter is doing its job, and if they
    # report more, this says by how much instead of inviting another guess.
    #
    # NOTE that the filter above delays on_press, so this measures the touch
    # MINUS the debounce. Anything the filter drops entirely never appears here
    # at all - a press that is invisible in this log is one the debounce ate.
    on_release:
      - logger.log:
          level: INFO
          format: "Touch on the button under the screen lasted %u ms"
          args: ['(unsigned) (millis() - id(btn_down_ms))']
      # CANCEL, IF THIS WAS A REAL PRESS. Deciding on press and acting on release
      # is not ceremony - it is the only way to tell a finger from a phantom.
      #
      # This screen produces touches nobody made: seventeen of them in half an
      # hour on 2026-07-22, measured. They used to be harmless, because
      # `tap_to_talk` declines to start a second pipeline, so a phantom arriving
      # mid-conversation did nothing. The moment a press started CANCELLING
      # instead, every phantom became a conversation killer - which is exactly
      # what was reported: listening ending after one second, over and over.
      #
      # The numbers separate them cleanly. Measured phantoms last 21 ms; measured
      # fingers last 119-151 ms. The 50 ms debounce already eats the short ones,
      # and this catches anything that slips past it. 100 ms sits five times above
      # the phantom and comfortably below a real press.
      #
      # Starting is left forgiving on purpose: a phantom that starts a pipeline
      # wastes fifteen seconds, a phantom that cancels one loses what you said.
      - if:
          condition:
            and:
              - lambda: return id(btn_wants_cancel);
              - lambda: return (millis() - id(btn_down_ms)) >= 100;
              - voice_assistant.is_running:
          then:
            - logger.log:
                level: INFO
                format: "Assistant cancelled by the button under the screen"
            - voice_assistant.stop:
      - lambda: id(btn_wants_cancel) = false;

  # THE UNFILTERED TWIN, and it starts nothing. Same GT911 index as the button
  # above, no `filters:`, so it sees every reported touch including the ones the
  # 50 ms debounce eats. All it does is count them and remember how long the last
  # one was.
  #
  # Why this rather than reading the log: a touch shorter than the debounce
  # produces no on_press, no on_release and no log line at all on the real
  # button, so a working filter and an untouched screen are indistinguishable
  # there. On 2026-07-20 the button started sixteen pipelines in ten minutes with
  # nobody near it; the debounce was added and nothing has fired since, which is
  # encouraging and proves nothing. If this counter climbs while the button stays
  # quiet, the phantom touches are real and the filter is earning its place. If
  # it stays at zero for a day of normal use, they stopped for some other reason
  # and the debounce is not what fixed it.
  #
  # A twin like this was tried once before and removed after being blamed for a
  # device dropping off the network. That was a mis-diagnosis: the real cause was
  # a placeholder SSID compiled into the firmware. The twin was innocent.
  - platform: gt911
    id: home_button_raw
    internal: true
    index: 0
    on_press:
      - lambda: |-
          id(raw_touch_count) += 1;
          id(raw_touch_down_ms) = millis();
    on_release:
      - lambda: id(raw_touch_ms) = millis() - id(raw_touch_down_ms);

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true

switch:
  - platform: gpio
    id: speaker_enable
    name: Speaker enable
    pin:
      number: ${amp_enable}
      ignore_strapping_warning: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    disabled_by_default: true

  - platform: template
    id: wake_sound_enabled
    name: Wake sound
    icon: "mdi:bell-ring"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config

  - platform: template
    id: mute
    name: Mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
      - script.execute: draw_display
    on_turn_off:
      - microphone.unmute:
      # The script, not an inline copy of what it does. The result is the same
      # here - mute has just gone off, so the script picks the idle phase - but
      # every other caller in this file goes through it, and the last inline
      # copy in this file drifted from its original and cost us a bug.
      - script.execute: set_idle_or_mute_phase
      - script.execute: draw_display

  # Exposed (not `internal:`) so an HA automation can silence a timer that is
  # ringing in an empty kitchen.
  - platform: template
    id: timer_ringing
    name: Timer ringing
    icon: "mdi:timer-alert"
    optimistic: true
    restore_mode: ALWAYS_OFF
    on_turn_on:
      # The alarm ALWAYS rings on the box, whatever `TTS output` says. A reply
      # should come out wherever you listen; an alarm should be interruptible and
      # insistent, and only the local speaker can be either. On the box it
      # repeats until something silences it and a tap on the screen stops it - on
      # a remote speaker it would play once, with no way for the box to know when
      # it finished or to cut it short.
      #
      # NOTE this means a muted `speaker_media_player` entity silences the alarm.
      #
      # AMPLIFIER ON FIRST, unconditionally, before anything else here. An
      # External reply cuts it for the length of the answer; if that ever failed
      # to restore, the alarm would ring into a dead amplifier - the one failure
      # this arrangement must not have. Costs one GPIO write and does not care
      # whether anything actually turned it off.
      - switch.turn_on: speaker_enable
      # Free the I2S bus first. The microphone holds it while the wake word is
      # listening, and `on_announcement` stops the wake word only once playback
      # has already begun - too late, so the speaker's first attempt fails with
      # "Parent bus is busy" and retries a second later.
      - script.execute: stop_wake_word
      - wait_until:
          condition:
            not:
              microphone.is_capturing:
          timeout: 2s
      # A muted or turned-down media player makes the alarm play silently, and
      # both survive reboots: the speaker media player persists volume and mute
      # to flash and restores them at boot, so a mute set once months ago is
      # still in force. Say so in the log rather than leaving someone to wonder
      # why a timer they can see ringing makes no sound.
      - lambda: |-
          if (id(speaker_media_player)->is_muted()) {
            ESP_LOGW("timer", "Alarm is ringing but the media player is MUTED - unmute it in Home Assistant");
          } else if (id(speaker_media_player)->volume < 0.15f) {
            ESP_LOGW("timer", "Alarm is ringing at volume %.2f - probably inaudible", id(speaker_media_player)->volume);
          }
      # Repeat with a 1 s gap until something turns this off.
      - lambda: |-
          id(speaker_media_player)
            ->make_call()
            .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
            .set_announcement(true)
            .perform();
          id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      # Safety net for a timer nobody silences. Home Assistant normally turns the
      # switch off long before this.
      - delay: 15min
      - switch.turn_off: timer_ringing
    on_turn_off:
      - lambda: |-
          id(speaker_media_player)
            ->make_call()
            .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
            .set_announcement(true)
            .perform();
          id(speaker_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      - media_player.stop:
          announcement: true
      # `restore_mode: ALWAYS_OFF` makes this automation run once during setup(),
      # so the screen work has to be gated - `draw_display` in setup() would paint
      # an LVGL that may not be up yet. Same trap that crashed the diagnostic
      # switches; harmless here only by luck of component ordering.
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display

  # ---------------------------------------------------------------------------
  # DIAGNOSTICS. Both exist to A/B a wake word that never fires, from Home
  # Assistant, without a reflash between arms. Remove them once it works.
  # ---------------------------------------------------------------------------

  # Theory: LVGL starves the audio path. The main loop is regularly logged
  # blocking for ~70 ms ("lvgl took a long time for an operation"), and the
  # microphone ring buffer only holds ~120 ms, so dropped frames would leave the
  # wake word deaf while Home Assistant's own STT still copes. Pausing LVGL
  # freezes the screen on its last frame; the assistant keeps running.
  - platform: template
    id: diag_pause_lvgl
    name: "Diag: pause LVGL"
    icon: "mdi:television-pause"
    optimistic: true
    # DISABLED, not ALWAYS_OFF: any restore mode that sets a state at boot makes
    # the switch fire its own on_turn_off during setup(), i.e. `lvgl.resume:`
    # against an LVGL that does not exist yet. That crashed the device in a
    # 40-second loop. Same trap as the template selects in the Waveshare project.
    restore_mode: DISABLED
    entity_category: diagnostic
    on_turn_on:
      - lvgl.pause:
    on_turn_off:
      - lvgl.resume:

  # Theory: two wake word models plus feature extraction do not fit the frame
  # budget, so inference falls behind real time. The previous, working config ran
  # a single model. This drops back to one at runtime.
  - platform: template
    id: diag_single_model
    name: "Diag: only the alexa model"
    icon: "mdi:numeric-1-box"
    optimistic: true
    restore_mode: DISABLED   # see diag_pause_lvgl above - fires in setup() otherwise
    entity_category: diagnostic
    # BOTH of the others, because there are three models, not two. This used to
    # disable okay_nabu alone and so left TWO running while claiming to leave
    # one - a diagnostic that misreports its own state is worse than none, since
    # the whole point is to answer "does the inference budget explain the missed
    # wake words" with a number you can trust.
    on_turn_on:
      - micro_wake_word.disable_model: mww_okay_nabu
      - micro_wake_word.disable_model: mww_hey_jarvis
    on_turn_off:
      - micro_wake_word.enable_model: mww_okay_nabu
      - micro_wake_word.enable_model: mww_hey_jarvis

select:
  - platform: template
    id: wake_word_engine_location
    name: Wake word engine location
    icon: "mdi:account-voice"
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            # Wait out a conversation before swapping engines - up to thirty
            # seconds. NOT "never switch mid-pipeline", which is what this said
            # before: wait_until CONTINUES when its timeout expires, it does not
            # abandon the rest of the actions. So a conversation still running
            # after thirty seconds gets the switch anyway. That is the lesser
            # evil, since the select already shows the new value and refusing
            # would leave the UI lying about which engine is live.
            - wait_until:
                condition:
                  lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
                timeout: 30s
            # Stop the engine being LEFT. This cannot go through stop_wake_word:
            # that script reads the select, and the select already holds the new
            # value by the time this runs - it would stop the engine we are
            # about to start.
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop:
                else:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop:
            - delay: 500ms
            # Starting DOES go through the script, which reads the select and so
            # picks the right engine by itself. It also carries the guards this
            # used to bypass: not into a running pipeline, not while the speaker
            # holds the I2S bus, and not inside the wake-beep window.
            - if:
                condition:
                  switch.is_off: mute
                then:
                  - script.execute: start_wake_word

  # Where spoken replies come out. (The timer alarm ignores this and always rings
  # on the box.) "External player" keeps the box from downloading and decoding
  # the TTS at all, which is what long replies choke on.
  - platform: template
    id: tts_output
    name: TTS output
    icon: "mdi:speaker-message"
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - This device
      - External player
      - Both
    initial_option: ${tts_output_default}

text_sensor:
  # What the external speaker is doing. Used to end the replying phase exactly
  # when it stops, instead of estimating - see on_end.
  - platform: homeassistant
    id: external_player_state
    entity_id: ${external_media_player_id}
    internal: true

  - platform: template
    id: text_request
    internal: true
  - platform: template
    id: text_response
    internal: true

# Instrumentacja wydajnosci. Wszystko `disabled_by_default`, wiec domyslnie nie
# kosztuje nic poza kilkoma bajtami RAM - wlaczasz encje w HA tylko wtedy, gdy
# cos mierzysz.
#
# Po co: objawem przeciazenia jest ostrzezenie "lvgl took a long time for an
# operation" w logu, ktore mowi ZE bylo zle, ale nie ile i nie jak czesto.
# `loop_time` to maksymalny czas jednego przebiegu petli glownej od poprzedniego
# odczytu, czyli bezposrednia miara tego samego zjawiska, tylko liczbowa. Dzieki
# temu "szybciej" przestaje byc opinia z czytania kodu.
#
# `block` (najwiekszy ciagly wolny blok) obok `free` nie jest nadmiarem: sterta
# potrafi miec duzo wolnego miejsca i mimo to nie oddac bufora dekodera, bo jest
# pofragmentowana. Rozjazd miedzy tymi dwoma to sygnal, ktorego samo `free` nie
# pokaze.
debug:
  update_interval: 30s

sensor:
  - platform: wifi_signal
    name: Wi-Fi signal
    entity_category: diagnostic
    update_interval: 60s
    disabled_by_default: true

  # The two numbers that settle the phantom-touch question. Read them together:
  # a count climbing while "Assistant started by the button" never appears in the
  # log means real touches are arriving and the debounce is catching them, and
  # the duration says how short they are, which is the number the 50 ms filter
  # was originally set blind. A count that stays at zero across a normal day
  # means nothing is touching the screen at all.
  - platform: template
    name: "Diag: raw touches on the button"
    id: diag_raw_touches
    lambda: return id(raw_touch_count);
    update_interval: 60s
    accuracy_decimals: 0
    entity_category: diagnostic
    disabled_by_default: true
  - platform: template
    name: "Diag: last raw touch length"
    id: diag_raw_touch_ms
    lambda: return id(raw_touch_ms);
    update_interval: 60s
    unit_of_measurement: ms
    accuracy_decimals: 0
    entity_category: diagnostic
    disabled_by_default: true

  - platform: debug
    free:
      name: "Diag: free heap"
      entity_category: diagnostic
      disabled_by_default: true
    block:
      name: "Diag: largest free block"
      entity_category: diagnostic
      disabled_by_default: true
    loop_time:
      name: "Diag: loop time max"
      entity_category: diagnostic
      disabled_by_default: true
    psram:
      name: "Diag: free PSRAM"
      entity_category: diagnostic
      disabled_by_default: true

###############################################################################
# ASSETS
###############################################################################

font:
  - id: font_body
    file:
      type: gfonts
      family: ${font_family}
      weight: 400
    size: 16
    glyphsets:
      - ${font_glyphsets}
    extras:
      - file:
          type: gfonts
          family: ${font_family}
          weight: 400
        glyphs: ${extra_glyphs}
  - id: font_request
    file:
      type: gfonts
      family: ${font_family}
      weight: 300
      italic: true
    size: 16
    glyphsets:
      - ${font_glyphsets}
    extras:
      - file:
          type: gfonts
          family: ${font_family}
          weight: 300
          italic: true
        glyphs: ${extra_glyphs}
  - id: font_timer
    file:
      type: gfonts
      family: ${font_family}
      weight: 500
    size: 26
    glyphsets:
      - ${font_glyphsets}

###############################################################################
# LVGL UI
#
# The system pages plus one status page the phases fall back to, and a top layer
# carrying the timer strip so it survives page changes. Screen taps belong to the
# UI: the assistant is started from the button under the screen, and the only
# full-screen tap targets are the ones the screen packages add deliberately.
###############################################################################

lvgl:
  id: lvgl_ui
  displays:
    - s3_box_lcd
  touchscreens:
    - touchscreen_id: box_touch
      long_press_time: 400ms
  buffer_size: 25%
  default_font: font_body
  bg_color: 0x000000

  top_layer:
    widgets:
      - bar:
          id: timer_bar_active
          hidden: true
          align: BOTTOM_MID
          width: 320
          height: 14
          min_value: 0
          max_value: 100
          value: 0
          bg_color: 0xFFFFFF
          border_width: 0
          pad_all: 1
          indicator:
            bg_color: 0x26ED3A
      - bar:
          id: timer_bar_paused
          hidden: true
          align: BOTTOM_MID
          width: 320
          height: 14
          min_value: 0
          max_value: 100
          value: 0
          bg_color: 0xFFFFFF
          border_width: 0
          pad_all: 1
          indicator:
            bg_color: 0x3B89E3
      - label:
          id: timer_label
          hidden: true
          align: TOP_RIGHT
          x: -8
          y: 8
          text: "00:00"
          text_font: font_timer
          text_color: 0x000000
          bg_color: 0xFFFFFF
          bg_opa: COVER
          radius: 6
          pad_all: 6

  pages:
    # No artwork here on purpose. Phase visuals come from a character package
    # (base/screens/face.yaml + base/faces/*), and shipping full-screen
    # illustrations that any such package immediately hides cost 225 KB of flash
    # each for nothing. What is left is the bare minimum that has to work before
    # - or without - any optional screen: three system pages and one status page
    # the phases fall back to.
    - id: page_boot
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            y: -26
            text: "${text_starting}"
            text_font: font_body
            text_color: 0x8A8A8A
        # Three dots, one lit at a time. Two properties on three tiny widgets,
        # six times a second, and only while this page is showing - the boot
        # screen is up for seconds at most, and after that the interval does
        # nothing at all.
        - obj:
            id: boot_dot_1
            align: CENTER
            x: -24
            y: 24
            width: 10
            height: 10
            radius: 6
            bg_color: ${accent_color}
            bg_opa: 27%   # matches the 70/255 the animation uses at rest
            border_width: 0
            pad_all: 0
        - obj:
            id: boot_dot_2
            align: CENTER
            x: 0
            y: 24
            width: 10
            height: 10
            radius: 6
            bg_color: ${accent_color}
            bg_opa: 27%   # matches the 70/255 the animation uses at rest
            border_width: 0
            pad_all: 0
        - obj:
            id: boot_dot_3
            align: CENTER
            x: 24
            y: 24
            width: 10
            height: 10
            radius: 6
            bg_color: ${accent_color}
            bg_opa: 27%   # matches the 70/255 the animation uses at rest
            border_width: 0
            pad_all: 0

    - id: page_no_wifi
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            text: "${text_no_wifi}"
            text_font: font_body
            text_color: 0xFF4D4D

    - id: page_no_ha
      bg_color: 0x000000
      widgets:
        - label:
            align: CENTER
            text: "${text_no_ha}"
            text_font: font_body
            text_color: 0xFF4D4D

    # Every assistant phase lands here unless a package claims it.
    - id: page_status
      bg_color: 0x000000
      widgets:
        - label:
            id: status_phase
            align: CENTER
            text: ""
            text_font: font_timer
            text_color: 0xFFFFFF
        - label:
            id: request_label
            align: TOP_MID
            y: 16
            width: 280
            long_mode: dot
            text: ""
            text_font: font_request
            text_color: 0xC8C8C8
        - label:
            id: response_label
            align: BOTTOM_MID
            y: -28
            width: 280
            long_mode: dot
            text: ""
            text_font: font_body
            text_color: 0xC8C8C8
