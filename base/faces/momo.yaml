# Momo - the cat.
#
# Ears, a big black screen, no colour of its own. Deadpan; amber-eyed.
#
# Usage - the character must come AFTER the face engine, because ESPHome
# resolves later-listed package files at a higher priority:
#
#   substitutions:
#     assistant: momo.yaml
#
# See base/faces/README.md.

esphome:
  on_boot:
    - priority: 800
      then:
        - logger.log:
            level: INFO
            format: "package: faces/momo.yaml"

# This character is artwork plus measurements; the drawing and animating is done
# by base/screens/face.yaml, which it pulls in itself. That is what lets a config
# name one assistant and get everything it needs - see the repository README.
packages:
  face_engine:
    url: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va
    ref: main
    files:
      - base/screens/face.yaml
    refresh: 0s

substitutions:
  face_background_file: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va/raw/main/base/faces/momo.png

  face_color: '0xFFC24D'
  face_mouth_color: '0xFFC24D'
  face_pupil_color: '0x1E1E1E'
  face_alarm_color: '0xFF5A5A'

  # A big square screen, centred. Blocky eyes with barely any corner rounding read
  # as pixels on a terminal - the opposite of Pip's soft ovals.
  face_center_x: '0'
  face_eye_offset: '38'
  face_eye_y: '-8'
  face_eye_w: '35'
  face_eye_h: '35'
  face_mouth_y: '36'
  face_mouth_w: '24'
  face_mouth_h: '8'

  face_pupil_w: '11'
  face_pupil_h: '17'
  face_pupil_radius: '3'
  face_pupil_dilate: '4'
  face_pupil_shrink: '3'
  face_gaze_dx: '8'

  face_eye_h_wide: '41'
  face_eye_h_think: '35'
  face_eye_h_narrow: '12'
  face_eye_h_shut: '4'
  face_mouth_open_h: '22'
  face_mouth_small_w: '18'
  face_mouth_think_w: '10'
  face_mouth_o_w: '18'
  face_mouth_o_h: '18'
  face_mouth_alarm_w: '32'
  face_mouth_alarm_h: '26'
  face_mouth_error_w: '16'
  face_listen_pulse: '4'
  face_shake_dx: '4'
  face_tick: 120ms
  face_eye_radius: '3'
  face_mouth_radius: '2'
