# Pip - the reference character.
#
# Round head, antenna, soft oval eyes. The friendliest of the three originals,
# and the one every other character was measured against.
#
# Usage - the character must come AFTER the face engine, because ESPHome
# resolves later-listed package files at a higher priority:
#
#   files:
#     - base/core.yaml
#     - base/screens/face.yaml
#     - base/faces/pip.yaml
#
# See base/faces/README.md.

esphome:
  on_boot:
    - priority: 800
      then:
        - logger.log:
            level: INFO
            format: "package: faces/pip.yaml"

substitutions:
  face_background_file: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va/raw/main/base/faces/pip.png

  face_color: '0x3AFAE6'
  face_mouth_color: '0x3AFAE6'
  face_pupil_color: '0x0A1A3C'
  face_alarm_color: '0xFF4D4D'

  # Measured off the original artwork: eyes at x +/-42, 36 px BELOW centre,
  # because this robot's panel sits low in the frame.
  face_center_x: '0'
  face_eye_offset: '42'
  face_eye_y: '36'
  face_eye_w: '27'
  face_eye_h: '38'
  face_mouth_y: '61'
  face_mouth_w: '26'
  face_mouth_h: '10'

  face_pupil_w: '9'
  face_pupil_h: '19'
  face_pupil_radius: '5'
  face_pupil_dilate: '4'
  face_pupil_shrink: '3'
  face_gaze_dx: '6'

  face_eye_h_wide: '44'
  face_eye_h_think: '26'
  face_eye_h_narrow: '14'
  face_eye_h_shut: '4'
  face_mouth_open_h: '22'
  face_mouth_small_w: '20'
  face_mouth_think_w: '12'
  face_mouth_o_w: '20'
  face_mouth_o_h: '20'
  face_mouth_alarm_w: '30'
  face_mouth_alarm_h: '24'
  face_mouth_error_w: '18'
  face_listen_pulse: '4'
  face_shake_dx: '4'
  face_tick: 120ms
  face_eye_radius: '10'
  face_mouth_radius: '8'
