# Astro — the astronaut.
#
# Sealed visor, cyan trim, one arm permanently waving. Reads as eager.
#
# Usage — the character must come AFTER the face engine, because ESPHome
# resolves later-listed package files at a higher priority:
#
#   files:
#     - base/core.yaml
#     - base/screens/face.yaml
#     - base/faces/astro.yaml    # <- after the engine
#
# See base/faces/README.md.

esphome:
  on_boot:
    - priority: 800
      then:
        - logger.log:
            level: INFO
            format: "package: faces/astro.yaml"

substitutions:
  face_background_file: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va/raw/main/base/faces/astro.png

  face_color: '0x00D4FF'
  face_alarm_color: '0xFF5A5A'

  # The visor runs from 75 px above centre to 6 px below it, is widest (139 px,
  # so +/-69) around its middle, and tapers at both ends - measured row by row,
  # not eyeballed. Tall eyes do not fit, so Pip's ovals become scanner slits:
  # wide, low, capsule-ended. Sized to fill the visor rather than float in it,
  # and the pair is centred on the visor's own middle (-34), not the screen's.
  face_eye_offset: '38'
  face_eye_y: '-44'
  face_eye_w: '42'
  face_eye_h: '16'
  face_mouth_y: '-18'
  face_mouth_w: '40'
  face_mouth_h: '9'

  # A slit cannot squash much before it vanishes, so the whole range is shallower
  # than Pip's and the glance carries more of the expression.
  face_eye_h_wide: '23'
  face_eye_h_think: '11'
  face_eye_h_narrow: '6'
  face_eye_h_shut: '3'
  face_mouth_open_h: '22'
  face_mouth_small_w: '26'
  face_mouth_think_w: '16'
  face_mouth_o_w: '20'
  face_mouth_o_h: '18'
  face_mouth_alarm_w: '40'
  face_mouth_alarm_h: '24'
  face_mouth_error_w: '24'
  face_glance_dx: '12'
  face_listen_pulse: '3'
  face_shake_dx: '5'
  face_tick: 120ms
  face_eye_radius: '8'     # capsule ends
  face_mouth_radius: '4'
