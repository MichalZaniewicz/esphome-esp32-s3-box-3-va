# Astro - the astronaut.
#
# Sealed visor, cyan trim, one arm permanently waving. Reads as eager.
#
# Usage - the character must come AFTER the face engine, because ESPHome
# resolves later-listed package files at a higher priority:
#
#   files:
#     - base/core.yaml
#     - base/screens/face.yaml
#     - base/faces/astro.yaml
#
# See base/faces/README.md.

esphome:
  on_boot:
    - priority: 800
      then:
        - logger.log:
            level: INFO
            format: "package: faces/astro.yaml"

substitutions:
  face_background_file: https://github.com/MichalZaniewicz/esphome-esp32-s3-box-3-va/raw/main/base/faces/astro.png

  face_color: '0x00D4FF'
  face_mouth_color: '0x00D4FF'
  face_pupil_color: '0x010172'
  face_alarm_color: '0xFF5A5A'

  # The visor runs from 75 px above centre to 6 below and is widest (+/-69) around
  # its middle - profiled row by row. Tall eyes do not fit, so the ovals become
  # scanner slits, sized so that even the wide-eyed alarm pose stays inside.
  face_center_x: '0'
  face_eye_offset: '34'
  face_eye_y: '-36'
  face_eye_w: '42'
  face_eye_h: '18'
  face_mouth_y: '-10'
  face_mouth_w: '40'
  face_mouth_h: '9'

  face_pupil_w: '14'
  face_pupil_h: '11'
  face_pupil_radius: '5'
  face_pupil_dilate: '3'
  face_pupil_shrink: '3'
  face_gaze_dx: '8'

  face_eye_h_wide: '24'
  face_eye_h_think: '18'
  face_eye_h_narrow: '7'
  face_eye_h_shut: '4'
  face_mouth_open_h: '21'
  face_mouth_small_w: '26'
  face_mouth_think_w: '16'
  face_mouth_o_w: '20'
  face_mouth_o_h: '18'
  face_mouth_alarm_w: '44'
  face_mouth_alarm_h: '20'
  face_mouth_error_w: '24'
  face_listen_pulse: '3'
  face_shake_dx: '4'
  face_tick: 120ms
  face_eye_radius: '8'
  face_mouth_radius: '4'
