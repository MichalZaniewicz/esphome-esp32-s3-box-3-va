        - line:
            id: jarvis_tick_9
            align: TOP_LEFT
            x: 0
            y: 0
            points:
              - 160, 14
              - 160, 0
            line_width: 2
            line_color: ${jarvis_color}
        - line:
            id: jarvis_tick_10
            align: TOP_LEFT
            x: 0
            y: 0
            points:
              - 213, 28
              - 217, 21
            line_width: 2
            line_color: ${jarvis_dim_color}
        - line:
            id: jarvis_tick_11
            align: TOP_LEFT
            x: 0
            y: 0
            points:
              - 252, 67
              - 259, 63
            line_width: 2
            line_color: ${jarvis_dim_color}
        - arc:
            id: jarvis_arc_out_0
            align: CENTER
            x: 0
            y: 0
            width: 176
            height: 176
            start_angle: 0
            end_angle: 38
            min_value: 0
            max_value: 100
            value: 100
            adjustable: false
            # The background arc is invisible; only the indicator is drawn, and
            # value 100 fills it right across start_angle..end_angle.
            arc_opa: TRANSP
            arc_width: ${jarvis_arc_w}
            indicator:
              arc_color: ${jarvis_color}
              arc_width: ${jarvis_arc_w}
            knob:
              bg_opa: TRANSP
            pad_all: 0
