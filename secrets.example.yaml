# Copy to secrets.yaml (kept out of git) and fill in.
wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# The core leaves the API unencrypted (LAN-only device). To turn encryption on,
# add an `api: encryption: key:` block to your thin config - it merges with the
# core's - and put the base64 key here:
#   https://esphome.io/components/api.html#configuration-variables
# api_encryption_key: "PUT_YOUR_OWN_BASE64_KEY_HERE"
